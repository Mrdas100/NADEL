<style>
:root{--bg:#fef8ee;--bg2:#fdf3dd;--bg3:#f5e8c0;--ac:#c8860a;--ac-bg:rgba(200,134,10,.10);--ac-bd:rgba(200,134,10,.25);--tx:#1a0a00;--tx2:#7a5010;--tx3:#b08040;--tx4:#d4a060;--card:#ffffff;--bd:#e8d8a0;--sh:0 2px 10px rgba(150,90,0,.08);--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;direction:rtl;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;}
button,input,select,textarea{font-family:'Cairo',sans-serif;}
button{cursor:pointer;border:none;outline:none;}
input,select,textarea{outline:none;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bk{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;color:var(--tx2);padding:6px 12px;font-size:15px;}
.atabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;flex-shrink:0;}
.atabs::-webkit-scrollbar{display:none;}
.atb{padding:10px 14px;background:none;border:none;border-bottom:2px solid transparent;color:var(--tx3);font-weight:700;font-size:12px;white-space:nowrap;}
.atb.on{border-bottom-color:var(--ac);color:var(--ac);}
.body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);}
.sec{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.sec-t{color:var(--ac);font-weight:800;font-size:14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.fl{color:var(--tx3);font-size:12px;font-weight:700;display:block;margin-bottom:4px;}
.inp{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:14px;}
.inp:focus{border-color:var(--ac-bd);}
.row{margin-bottom:12px;}
.btn{background:var(--ac);border:none;border-radius:8px;padding:7px 14px;color:#fff;font-weight:700;font-size:13px;}
.btn.sm{padding:5px 10px;font-size:12px;}
.btn.del{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);color:#dc2626;}
.btn.out{background:none;border:1px solid var(--bd);color:var(--tx2);}
.btn:active{transform:scale(.97);}
.badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.bp{background:rgba(245,158,11,.12);color:#b45309;border:1px solid rgba(245,158,11,.3);}
.br{background:rgba(59,130,246,.12);color:#1d4ed8;border:1px solid rgba(59,130,246,.3);}
.bg2c{background:rgba(16,185,129,.12);color:#047857;border:1px solid rgba(16,185,129,.3);}
.bdd{background:rgba(107,114,128,.1);color:#4b5563;border:1px solid rgba(107,114,128,.25);}
.chip{background:var(--ac-bg);border:1px solid var(--ac-bd);border-radius:8px;padding:2px 9px;font-size:11px;color:var(--tx2);}
.mi-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);}
.mi-img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
#toasts{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{background:var(--card);border:1px solid var(--bd);padding:9px 15px;border-radius:10px;font-size:13px;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:pop .3s ease;}
.toast.ok{border-color:#10b981;color:#047857;}
.toast.err{border-color:#f87171;color:#dc2626;}
@keyframes pop{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
/* OVERLAY MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.ov.on{display:flex;}
.sh{background:var(--bg);border-radius:24px 24px 0 0;width:100%;max-width:520px;animation:su .26s ease;max-height:90vh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pill{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;}
.sh-body{padding:16px 16px 32px;}
/* QR white box */
.qr-box{background:#fff;border-radius:12px;padding:14px;display:inline-block;}
/* COLOR SWATCHES */
.csw-row{display:flex;flex-wrap:wrap;gap:8px;}
.csw{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;}
.csw.on{border-color:var(--ac);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--ac);}
</style>
</head>

<div id="toasts"></div>

<!-- ITEM EDITOR -->
<div id="ie-ov" class="ov" onclick="if(event.target===this)closeIE()">
  <div class="sh">
    <div class="pill"></div>

      <div class="row"><label class="fl">الاسم</label><input id="ie-name" class="inp" placeholder="اسم الصنف"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="row"><label class="fl">السعر (ريال)</label><input id="ie-price" class="inp" type="number"></div>
        <div class="row"><label class="fl">إيموجي</label><input id="ie-emoji" class="inp" style="text-align:center;font-size:20px" placeholder="🍽️"></div>
      </div>
      <div class="row"><label class="fl">التصنيف</label><select id="ie-cat" class="inp" style="width:100%"></select></div>
      <div class="row"><label class="fl">رابط الصورة</label><input id="ie-img" class="inp" style="direction:ltr" placeholder="https://..."></div>
      <div class="row"><label class="fl">خيارات الحجم (مثال: صغير=6,كبير=8)</label><input id="ie-vars" class="inp" placeholder="صغير=6,كبير=8"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;margin-bottom:8px">
        <label style="font-weight:700">مفعّل في القائمة</label>
        <input type="checkbox" id="ie-active" checked style="width:20px;height:20px;accent-color:var(--ac)">
      </div>
      <button onclick="saveItem()" style="width:100%;background:var(--ac);border:none;border-radius:12px;padding:12px;color:#fff;font-weight:800;font-size:15px;margin-bottom:8px">💾 حفظ</button>
      <button id="ie-del" onclick="deleteItem()" style="width:100%;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:12px;padding:11px;color:#dc2626;font-weight:700;font-size:14px;display:none;margin-bottom:8px">🗑️ حذف الصنف</button>
      <button onclick="closeIE()" style="width:100%;background:none;border:none;color:var(--tx3);font-size:13px;text-decoration:underline">إلغاء</button>
    </div>
  </div>
</div>

<!-- QR MODAL -->
<div id="qr-ov" class="ov" onclick="if(event.target===this)closeQR()">
  <div class="sh">
    <div class="pill"></div>
    <div class="sh-body" style="text-align:center">
      <h3 id="qr-t" style="color:var(--ac);margin-bottom:14px;font-size:16px">QR طاولة</h3>

      <p id="qr-url" style="color:var(--tx3);font-size:11px;word-break:break-all;margin-bottom:14px"></p>
      <div style="display:flex;gap:8px;justify-content:center">
        <button onclick="printQR()" class="btn">🖨️ طباعة</button>
        <button onclick="closeQR()" class="btn out">إغلاق</button>
      </div>
    </div>
  </div>
</div>

function renderTab(id){

// ══ REPORTS ══
function renderReports(el){
  var del=orders.filter(o=>o.status==="delivered");
  var rev=del.reduce((s,o)=>s+(o.total||0),0);
  var pend=orders.filter(o=>o.status==="pending").length;
  var freq={};orders.forEach(o=>(o.items||[]).forEach(i=>{freq[i.name]=(freq[i.name]||0)+i.qty;}));
  var top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8);
  var tbl=Array.from({length:SS.tc},(_,i)=>i+1).map(id=>({id,cnt:orders.filter(o=>o.tableId===id).length,rev:orders.filter(o=>o.tableId===id).reduce((s,o)=>s+(o.total||0),0)})).filter(x=>x.cnt>0).sort((a,b)=>b.rev-a.rev);
  var card=(e,l,v,c)=>`<div style="background:${c}10;border:1px solid ${c}25;border-radius:14px;padding:14px"><div style="font-size:26px">${e}</div><div style="color:${c};font-weight:900;font-size:22px;margin-top:4px">${v}</div><div style="color:${c}88;font-size:12px">${l}</div></div>`;
  var html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${card("📋","إجمالي الطلبات",orders.length,"#c8860a")}${card("⏳","في الانتظار",pend,"#f59e0b")}${card("✅","تم التسليم",del.length,"#10b981")}${card("💰","الإيرادات",rev+" ر","#8b5cf6")}</div>`;
  if(top.length) html+=`<div class="sec"><div class="sec-t">🔥 الأكثر طلباً</div>${top.map(([n,q],i)=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--tx2);font-size:13px">#${i+1} ${n}</span><span style="color:var(--ac);font-weight:700">${q}×</span></div><div style="background:var(--bg3);border-radius:4px;height:5px"><div style="background:var(--ac);height:100%;width:${(q/top[0][1]*100)}%;border-radius:4px"></div></div></div>`).join("")}</div>`;
  if(tbl.length) html+=`<div class="sec"><div class="sec-t">🪑 مبيعات الطاولات</div>${tbl.map(x=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--tx2)">طاولة ${x.id}</span><div><span style="color:#3b82f6;font-size:13px;margin-left:12px">${x.cnt} طلب</span><span style="color:var(--ac);font-weight:700">${x.rev} ريال</span></div></div>`).join("")}</div>`;
  el.innerHTML=html||'<div style="text-align:center;padding:60px;color:var(--tx4)">لا بيانات بعد</div>';
}

// ══ ALL ORDERS ══
function renderOrders(el){

  var bdgMap={pending:"bp",preparing:"br",ready:"bg2c",delivered:"bdd"};

  el.innerHTML='<div class="sec">'+orders.map(o=>{

// ══ MENU CMS ══
function renderMenu(el){

var EXTRAS=(function(){try{var s=JSON.parse(localStorage.getItem("qamra_ex")||"null");if(s)return s;}catch(e){}return{"المشروبات الساخنة":[{name:"السكر",type:"single",opts:["بدون سكر","سكر خفيف","سكر عادي","سكر زيادة"]},{name:"الحليب",type:"single",opts:["بدون حليب","حليب قليل","حليب زيادة"]},{name:"إضافات",type:"multi",opts:["نعناع","حبق","زنجبيل","هيل زيادة","قرفة"]}],"القهوة":[{name:"التحميص",type:"single",opts:["فاتحة","متوسطة","غامقة"]},{name:"إضافات",type:"multi",opts:["هيل","زعفران","ميرمية"]}],"المشروبات الباردة":[{name:"الثلج",type:"single",opts:["بدون ثلج","ثلج قليل","ثلج عادي","ثلج زيادة"]},{name:"السكر",type:"single",opts:["بدون سكر","سكر خفيف","سكر عادي"]},{name:"إضافات",type:"multi",opts:["نعناع","حبق","ليمون زيادة"]}],"الحلى":[{name:"الحلاوة",type:"single",opts:["خفيف","عادي","زيادة"]},{name:"إضافات",type:"multi",opts:["مكسرات","قشطة","عسل زيادة"]}],"المناقيش":[{name:"الحرارة",type:"single",opts:["عادي","حار خفيف","حار"]},{name:"إضافات",type:"multi",opts:["زيتون","جبن زيادة"]}],"الفطائر":[{name:"الحرارة",type:"single",opts:["عادي","حار خفيف","حار"]}],"سمبوسة":[{name:"الصلصة",type:"single",opts:["بدون صلصة","صلصة حارة","صلصة ثوم"]}]};})();
function renderExtras(el){
  el.innerHTML=Object.keys(EXTRAS).map(cat=>`<div class="sec"><div class="sec-t">${cat} <button class="btn sm" onclick="addEG('${cat}')">➕</button></div>${EXTRAS[cat].map((g,gi)=>`<div style="padding:8px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-weight:700;font-size:13px">${g.name} <small style="color:var(--tx4)">(${g.type==="single"?"واحد":"متعدد"})</small></span><div style="display:flex;gap:5px"><button onclick="editEG('${cat}',${gi})" class="btn sm">✏️</button><button onclick="delEG('${cat}',${gi})" class="btn sm del">🗑️</button></div></div><div style="display:flex;flex-wrap:wrap;gap:5px">${g.opts.map(o=>`<span class="chip">${o}</span>`).join("")}</div></div>`).join("")}</div>`).join("")
   +`<button onclick="addNewCatEX()" class="btn" style="width:100%;margin-top:8px">➕ تصنيف جديد للخيارات</button>`;
}
function addEG(cat){var n=prompt("اسم المجموعة:");if(!n)return;var type=confirm("اختيار واحد فقط؟")?"single":"multi";var opts=prompt("الخيارات (بفاصلة):");if(!opts)return;if(!EXTRAS[cat])EXTRAS[cat]=[];EXTRAS[cat].push({name:n.trim(),type,opts:opts.split(",").map(s=>s.trim()).filter(s=>s)});saveEX();renderExtras(document.getElementById("abody"));}
function editEG(cat,gi){var g=EXTRAS[cat][gi];var n=prompt("الاسم:",g.name);if(n===null)return;EXTRAS[cat][gi].name=n.trim();var opts=prompt("الخيارات:",g.opts.join(","));if(opts===null)return;EXTRAS[cat][gi].opts=opts.split(",").map(s=>s.trim()).filter(s=>s);saveEX();renderExtras(document.getElementById("abody"));}
function delEG(cat,gi){if(!confirm("حذف؟"))return;EXTRAS[cat].splice(gi,1);saveEX();renderExtras(document.getElementById("abody"));}
function addNewCatEX(){var cat=prompt("اسم التصنيف:");if(!cat||!cat.trim())return;if(!EXTRAS[cat.trim()])EXTRAS[cat.trim()]=[];saveEX();renderExtras(document.getElementById("abody"));}
function saveEX(){localStorage.setItem("qamra_ex",JSON.stringify(EXTRAS));if(db)db.collection("settings").doc("cafe").set({extras:EXTRAS},{merge:true}).catch(()=>{});}

// ══ QR ══
function renderQRTab(el){
  var base=window.location.href.replace("admin.html","customer.html");
  el.innerHTML=`<div class="sec"><div class="sec-t">رابط صفحة الطلب</div><input class="inp" id="qr-base" value="${base}" style="direction:ltr;font-size:12px"></div>`
    +`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">${Array.from({length:SS.tc},(_,i)=>i+1).map(n=>`<div class="sec" style="text-align:center;padding:12px"><div style="font-weight:800;margin-bottom:8px;color:var(--tx)">طاولة ${n}</div><button onclick="genQR(${n})" class="btn sm">📱 QR</button></div>`).join("")}</div>`;
}
function genQR(n){
  var base=document.getElementById("qr-base")?document.getElementById("qr-base").value.trim():window.location.href.replace("admin.html","customer.html");
  var url=base.split("?")[0]+"?table="+n;
  setSafe("qr-t","QR طاولة "+n); setSafe("qr-url",url);
  var c=document.getElementById("qr-canvas");c.innerHTML="";
  new QRCode(c,{text:url,width:200,height:200,colorDark:"#0d0800",colorLight:"#fff"});
  document.getElementById("qr-ov").classList.add("on");
}
function closeQR(){document.getElementById("qr-ov").classList.remove("on");}
function printQR(){
  var c=document.getElementById("qr-canvas");var t=document.getElementById("qr-t").textContent;var s=lS();
  var pa=document.getElementById("print-area");pa.style.display="block";
  pa.innerHTML=`<div style="text-align:center;font-family:Cairo,sans-serif;padding:20px"><h2>${s.cn||"شاهي قمرا"}</h2><p>${t}</p>${c.innerHTML}<p style="font-size:11px;color:#888">${document.getElementById("qr-url").textContent}</p></div>`;
  window.print(); setTimeout(()=>{pa.style.display="none";pa.innerHTML="";},1000);
}

    <div id="lt-emoji-sec" ${curLt!=="emoji"?"style='display:none'":""}>

}
var draftAC=null,draftLT=null,draftLV=null;
function previewAC(c){draftAC=c;document.documentElement.style.setProperty("--ac",c);var r=h2rgb(c);document.documentElement.style.setProperty("--ac-bg","rgba("+r+",0.10)");document.documentElement.style.setProperty("--ac-bd","rgba("+r+",0.25)");}
function setLT(t){draftLT=t;["emoji","text"].forEach(x=>{var s=document.getElementById("lt-"+x+"-sec");if(s)s.style.display=t===x?"block":"none";});}
function setLogo(e){draftLV=e;renderDesign(document.getElementById("abody"));}
function h2rgb(h){h=h.replace("#","");if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return parseInt(h.substr(0,2),16)+","+parseInt(h.substr(2,2),16)+","+parseInt(h.substr(4,6),16);}
function saveDesign(){
  var s=lS(); if(!s.design)s.design={};
  if(draftAC)s.design.ac=draftAC;
  var lt=draftLT||(s.design.logoType||"emoji");s.design.logoType=lt;
  var lv=lt==="text"?(document.getElementById("logo-text")?.value||""):(draftLV||s.design.logo||"🌙");s.design.logo=lv;
  sS(s);
  if(db)db.collection("settings").doc("cafe").set({design:s.design},{merge:true}).catch(()=>{});
  toast("✅ تم حفظ التصميم — سيظهر لدى العملاء",true);
}

  document.getElementById("ie-emoji").value=editingItem?editingItem.emoji||"":"🍽️";
  document.getElementById("ie-img").value=editingItem?editingItem.img||"":"";
  document.getElementById("ie-vars").value=editingItem&&editingItem.variants?editingItem.variants.map(v=>v.n+"="+v.p).join(","):"";
  document.getElementById("ie-active").checked=editingItem?editingItem.active!==false:true;
  document.getElementById("ie-del").style.display=editingItem?"block":"none";
  var sel=document.getElementById("ie-cat");
  sel.innerHTML=CATS.filter(c=>c!=="الكل").map(c=>`<option value="${c}"${editingItem&&editingItem.cat===c?" selected":""}>${c}</option>`).join("");
  document.getElementById("ie-ov").classList.add("on");
}
function closeIE(){document.getElementById("ie-ov").classList.remove("on");}
function saveItem(){
  var name=document.getElementById("ie-name").value.trim();
  var price=parseFloat(document.getElementById("ie-price").value)||0;
  if(!name||!price){toast("أدخل الاسم والسعر",false);return;}
  var varsStr=document.getElementById("ie-vars").value.trim();
  var variants=[];if(varsStr)varsStr.split(",").forEach(v=>{var p=v.split("=");if(p.length===2)variants.push({n:p[0].trim(),p:parseFloat(p[1])||0});});
  var data={name,price,cat:document.getElementById("ie-cat").value,emoji:document.getElementById("ie-emoji").value.trim()||"🍽️",img:document.getElementById("ie-img").value.trim(),variants,active:document.getElementById("ie-active").checked,order:editingItem?editingItem.order||0:MENU.length};
  if(db){
    var ref=editingItem?db.collection("menu").doc(String(editingItem.id)):db.collection("menu").doc();
    ref.set(data,{merge:true}).then(()=>{toast("✅ تم الحفظ",true);loadMenuFB();closeIE();renderMenu(document.getElementById("abody"));}).catch(e=>toast("خطأ: "+e.message,false));
  } else {
    var id=editingItem?editingItem.id:(Date.now()+"");data.id=id;
    var idx2=MENU.findIndex(m=>m.id==id);if(idx2>=0)MENU[idx2]=data;else MENU.push(data);
    toast("✅ تم الحفظ",true);closeIE();renderMenu(document.getElementById("abody"));
  }
}
function deleteItem(){
  if(!editingItem||!confirm("حذف "+editingItem.name+"؟"))return;
  if(db){db.collection("menu").doc(String(editingItem.id)).delete().then(()=>{toast("🗑️ تم الحذف",true);loadMenuFB();closeIE();renderMenu(document.getElementById("abody"));});}
  else{MENU=MENU.filter(m=>m.id!==editingItem.id);closeIE();renderMenu(document.getElementById("abody"));toast("🗑️ تم الحذف",true);}
}
function loadMenuFB(){if(!db)return;db.collection("menu").orderBy("order").get().then(s=>{if(!s.empty){MENU=[];s.forEach(d=>MENU.push({id:d.id,...d.data()}));}}).catch(()=>{});}

// ══ TOAST & HELPERS ══
function setSafe(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function toast(msg,ok){
  var d=document.createElement("div");d.className="toast"+(ok?" ok":" err");d.textContent=msg;
  document.getElementById("toasts").appendChild(d);setTimeout(()=>{if(d.parentNode)d.remove();},3000);
}

// ══ INIT ══
(function(){
  loadSS();
  var s=lS();if(s.cats&&s.cats.length)CATS=s.cats;
  try{var ex=JSON.parse(localStorage.getItem("qamra_ex")||"null");if(ex)EXTRAS=ex;}catch(e){}
  if(db)loadMenuFB();
  buildTabs(); renderTab("reports");
  setInterval(()=>{if(curTab==="orders"||curTab==="reports")renderTab(curTab);},8000);
})();
</script>
