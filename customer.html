<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title id="client-title">تحميل...</title>
<link id="font-link" href="" rel="stylesheet">
<style id="theme-style">
/* يتم توليد الألوان ديناميكياً بناءً على اختيار الموظف */
:root{--bg:#0d0800;--ac:#d4a017;--tx:#f0e8cc;}
body{margin:0;padding:20px;transition: 0.3s;}
.header{text-align:center;padding:40px 0;}
.menu-item{background:rgba(255,255,255,0.05);padding:15px;border-radius:12px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.1);}
</style>
</head>
<body id="main-body">

<div class="header">
    <h1 id="display-name">شاهي قمرا</h1>
    <p>أهلاً بك في مقهانا</p>
</div>

<div id="menu-container">
    <div class="menu-item">☕ قهوة سعودية - 15 ريال</div>
    <div class="menu-item">🍵 شاهي تلقيمة - 5 ريال</div>
</div>

<script>
function applySettings() {
    const S = JSON.parse(localStorage.getItem('cafeSettings')) || { theme: 'dark', cn: 'شاهي قمرا', font: 'Cairo' };
    
    // تطبيق اسم المقهى
    document.title = S.cn;
    document.getElementById('display-name').innerText = S.cn;
    
    // تطبيق الخط
    document.body.style.fontFamily = S.font;
    document.getElementById('font-link').href = `https://fonts.googleapis.com/css2?family=${S.font}:wght@400;700&display=swap`;

    // تطبيق الثيم
    const b = document.getElementById('main-body');
    if(S.theme === 'dark') {
        b.style.background = "#0d0800"; b.style.color = "#f0e8cc";
    } else if(S.theme === 'light') {
        b.style.background = "#f9f9f9"; b.style.color = "#222";
    } else if(S.theme === 'gold') {
        b.style.background = "#1a1200"; b.style.color = "#d4a017";
    } else if(S.theme === 'lavender') {
        b.style.background = "#2d2438"; b.style.color = "#e0d1f0";
    }
}

// التحديث التلقائي إذا قام الموظف بتغيير شيء
window.addEventListener('storage', applySettings);
applySettings();
</script>
</body>
</html>
