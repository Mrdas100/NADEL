<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>شاهي قمرا — اطلب الآن</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#0d0800;color:#f0e8cc;min-height:100vh;overflow:hidden;}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;outline:none;}
/* SCREENS */
.page{display:none;flex-direction:column;height:100vh;width:100%;position:absolute;top:0;left:0;}
.page.active{display:flex;}
/* HEADER */
.hdr{background:#0a0600;border-bottom:1px solid #1e1400;padding:13px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-title{color:#d4a017;font-weight:800;font-size:16px;}
.hdr-cafe{margin-right:auto;color:#342010;font-size:12px;}
.back-btn{background:rgba(255,255,255,.07);border-radius:8px;color:#a08040;padding:6px 13px;font-size:16px;border:1px solid rgba(255,255,255,.05);}
/* TABS */
.tab-bar{display:flex;background:#0a0600;border-bottom:1px solid #1e1400;flex-shrink:0;}
.tab-btn{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;color:#342010;font-weight:700;font-size:12px;transition:color .15s;}
.tab-btn.on{border-bottom-color:#d4a017;color:#d4a017;}
/* CATEGORY PILLS */
.cat-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#0a0600;border-bottom:1px solid #1e1400;flex-shrink:0;}
.cat-bar::-webkit-scrollbar{display:none;}
.cat-pill{border:1px solid #d4a01730;border-radius:20px;padding:5px 14px;font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0;background:#d4a0171a;color:#d4a017;transition:all .15s;}
.cat-pill.on{background:#d4a017;color:#fff;border-color:#d4a017;}
/* SCROLL */
.scroller{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#2a1a00;}
/* ITEM CARD */
.item-card{background:rgba(255,255,255,.04);border:1px solid #1e1400;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.item-img{width:64px;height:64px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#0a0600;}
.item-name{color:#f0e8cc;font-weight:700;font-size:15px;line-height:1.3;}
.item-cat{color:#5a4020;font-size:11px;margin-top:2px;}
.item-price{color:#d4a017;font-weight:800;font-size:16px;margin-top:4px;}
.qty-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.qty-btn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#f0e8cc;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.qty-btn.plus{background:#d4a0171a;border-color:#d4a01738;color:#d4a017;}
.qty-btn:active{transform:scale(.9);}
.qty-num{color:#d4a017;font-weight:900;min-width:22px;text-align:center;font-size:16px;}
/* FLOAT CART BTN */
.float-wrap{position:sticky;bottom:0;padding:12px 14px;background:linear-gradient(0deg,#0d0800 65%,transparent);flex-shrink:0;}
.float-btn{width:100%;background:#d4a017;border:none;border-radius:14px;padding:14px 0;color:#fff;font-weight:800;font-size:16px;box-shadow:0 4px 18px #d4a01755;}
.float-btn:active{transform:scale(.98);}
/* CART ITEM */
.cart-item{background:rgba(255,255,255,.04);border:1px solid #1e1400;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.del-btn{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.28);border-radius:8px;color:#f87171;padding:6px 10px;font-size:14px;flex-shrink:0;}
.del-btn:active{transform:scale(.9);}
/* TOTAL BOX */
.total-box{background:#d4a0171a;border:1px solid #d4a01738;border-radius:12px;padding:14px;margin-bottom:14px;}
.total-row{display:flex;justify-content:space-between;color:#a08040;margin-bottom:6px;font-size:14px;}
.total-row:last-child{margin-bottom:0;}
.total-big{color:#d4a017;font-weight:900;font-size:20px;}
/* CONFIRM BTN */
.confirm-btn{width:100%;background:#d4a017;border:none;border-radius:14px;padding:15px 0;color:#fff;font-weight:800;font-size:17px;box-shadow:0 4px 18px #d4a01755;}
.confirm-btn:active{transform:scale(.98);}
/* TABLE GRID */
.table-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:20px;}
.table-btn{background:#d4a0171a;border:1px solid #d4a01730;border-radius:12px;color:#d4a017;font-weight:800;font-size:18px;padding:16px 0;transition:all .12s;}
.table-btn:active{background:#d4a017;color:#fff;transform:scale(.95);}
/* ORDER CARD */
.order-card{border-radius:14px;padding:14px;margin-bottom:10px;}
.order-badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.b-pending  {background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid #f59e0b40;}
.b-preparing{background:rgba(59,130,246,.15);color:#3b82f6;border:1px solid #3b82f640;}
.b-ready    {background:rgba(16,185,129,.15);color:#10b981;border:1px solid #10b98140;}
.b-delivered{background:rgba(107,114,128,.12);color:#9ca3af;border:1px solid #9ca3af30;}
.chip{background:#d4a0171a;border:1px solid #d4a01730;border-radius:8px;padding:3px 10px;font-size:12px;color:#a08040;}
/* EMPTY */
.empty-state{text-align:center;padding:56px 24px;}
.empty-icon{font-size:54px;margin-bottom:14px;}
.empty-msg{color:#5a4020;font-weight:700;font-size:16px;}
.empty-sub{color:#342010;font-size:13px;margin-top:6px;}
/* TOAST */
#toasts{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:#064e3b;border:1px solid #10b981;color:#6ee7b7;padding:10px 18px;border-radius:10px;font-size:14px;max-width:300px;text-align:right;animation:pop .3s ease;}
@keyframes pop{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<div id="toasts"></div>

<!-- PAGE 2: MENU -->

    <button id="tab2" class="tab-btn"    onclick="switchTab(2)">طلباتي</button>
  </div>
  <!-- TAB 0: MENU -->
  <div id="view0" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div id="cat-bar" class="cat-bar"></div>
    <div class="scroller">
      <div id="items-list" style="padding:14px 14px 0;"></div>
      <div style="height:80px;"></div>
    </div>
    <div id="cart-float" class="float-wrap" style="display:none;">
      <button id="cart-float-btn" class="float-btn" onclick="switchTab(1)">🛒 السلة</button>
    </div>
  </div>
  <!-- TAB 1: CART -->
  <div id="view1" class="scroller" style="display:none;padding:14px;">
    <div id="cart-content"></div>
  </div>
  <!-- TAB 2: TRACK -->
  <div id="view2" class="scroller" style="display:none;padding:14px;">
    <div id="orders-content"></div>
  </div>
</div>

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var currentTable  = null;
var currentCat    = "الكل";
var cart          = [];
var currentTab    = 0;

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
function loadSettings() {
  try { return JSON.parse(localStorage.getItem("qamra_settings") || "{}"); } catch(e) { return {}; }
}
function loadOrders() {
  try { return JSON.parse(localStorage.getItem("qamra_orders") || "[]"); } catch(e) { return []; }
}
function saveOrders(list) {
  localStorage.setItem("qamra_orders", JSON.stringify(list));
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showPage(id) {
  var pages = document.querySelectorAll(".page");
  for (var i = 0; i < pages.length; i++) {
    pages[i].classList.remove("active");
    pages[i].style.display = "none";
  }
  var el = document.getElementById(id);
  if (el) { el.classList.add("active"); el.style.display = "flex"; }
}

function openTablePicker() {
  var s = loadSettings();
  var tc  = s.tableCount  || 10;
  var tp  = s.tablePrefix || "طاولة";
  var cn  = s.cafeName    || "شاهي قمرا";
  document.getElementById("cafe-t1").textContent = cn;
  // build grid
  var grid = document.getElementById("table-grid");
  grid.innerHTML = "";
  for (var i = 1; i <= tc; i++) {
    (function(num, prefix) {
      var btn = document.createElement("button");
      btn.className = "table-btn";
      btn.textContent = num;
      btn.onclick = function() { startOrder(num, prefix, cn); };
      grid.appendChild(btn);
    })(i, tp);
  }
  showPage("p1");
}

function startOrder(tableNum, prefix, cafeName) {
  currentTable = tableNum;
  currentCat   = "الكل";
  cart         = [];
  document.getElementById("table-label").textContent = prefix + " " + tableNum;
  document.getElementById("cafe-t2").textContent     = cafeName;
  buildCatBar();
  renderItems();
  switchTab(0);
  showPage("p2");
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  var d = document.createElement("div");
  d.className = "toast";
  d.textContent = msg;
  document.getElementById("toasts").appendChild(d);
  setTimeout(function() { if (d.parentNode) d.parentNode.removeChild(d); }, 3500);
}

// ═══════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════
function buildCatBar() {
  var bar = document.getElementById("cat-bar");
  bar.innerHTML = "";
  for (var i = 0; i < CATS.length; i++) {
    (function(cat) {
      var btn = document.createElement("button");
      btn.className = "cat-pill" + (cat === currentCat ? " on" : "");
      btn.textContent = cat;
      btn.onclick = function() { currentCat = cat; buildCatBar(); renderItems(); };
      bar.appendChild(btn);
    })(CATS[i]);
  }
}

// ═══════════════════════════════════════════
// MENU ITEMS
// ═══════════════════════════════════════════
function getCartQty(id) {
  for (var i = 0; i < cart.length; i++) { if (cart[i].id === id) return cart[i].qty; }
  return 0;
}

function addToCart(id) {
  var item = null;
  for (var i = 0; i < MENU.length; i++) { if (MENU[i].id === id) { item = MENU[i]; break; } }
  if (!item) return;
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) { cart[i].qty++; renderItems(); return; }
  }
  cart.push({ id: item.id, name: item.name, price: item.price, cat: item.cat, emoji: item.emoji, img: item.img, qty: 1 });
  renderItems();
}

function removeFromCart(id) {
  for (var i = 0; i < cart.length; i++) {
    if (cart[i].id === id) {
      cart[i].qty--;
      if (cart[i].qty <= 0) cart.splice(i, 1);
      break;
    }
  }
  renderItems();
}

function removeItemFully(id) {
  for (var i = 0; i < cart.length; i++) { if (cart[i].id === id) { cart.splice(i, 1); break; } }
  renderCart();
  renderItems();
}

function renderItems() {
  var list = document.getElementById("items-list");
  list.innerHTML = "";
  var items = (currentCat === "الكل") ? MENU : MENU.filter(function(m) { return m.cat === currentCat; });

  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var qty  = getCartQty(item.id);
    var card = document.createElement("div");
    card.className = "item-card";

    var img = document.createElement("img");
    img.className = "item-img";
    img.src = item.img;
    img.alt = item.name;
    img.onerror = function() { this.style.display = "none"; };
    card.appendChild(img);

    var info = document.createElement("div");
    info.style.flex = "1";
    info.style.minWidth = "0";
    info.innerHTML = '<div class="item-name">' + item.name + '</div>'
                   + '<div class="item-cat">'  + item.cat  + '</div>'
                   + '<div class="item-price">' + item.price + ' ريال</div>';
    card.appendChild(info);

    var qwrap = document.createElement("div");
    qwrap.className = "qty-wrap";

    if (qty > 0) {
      var minusBtn = document.createElement("button");
      minusBtn.className = "qty-btn";
      minusBtn.textContent = "−";
      (function(itemId) {
        minusBtn.onclick = function() { removeFromCart(itemId); };
      })(item.id);
      var qnum = document.createElement("span");
      qnum.className = "qty-num";
      qnum.textContent = qty;
      qwrap.appendChild(minusBtn);
      qwrap.appendChild(qnum);
    }

    var plusBtn = document.createElement("button");
    plusBtn.className = "qty-btn plus";
    plusBtn.textContent = "+";
    (function(itemId) {
      plusBtn.onclick = function() { addToCart(itemId); };
    })(item.id);
    qwrap.appendChild(plusBtn);
    card.appendChild(qwrap);
    list.appendChild(card);
  }

  updateCartFloat();
}

function updateCartFloat() {
  var total = 0; var count = 0;
  for (var i = 0; i < cart.length; i++) { total += cart[i].price * cart[i].qty; count += cart[i].qty; }
  var fl  = document.getElementById("cart-float");
  var btn = document.getElementById("cart-float-btn");
  if (cart.length > 0) {
    fl.style.display = "block";
    btn.textContent  = "🛒 السلة (" + cart.length + ") — " + total + " ريال";
  } else {
    fl.style.display = "none";
  }
  document.getElementById("tab1").textContent = cart.length ? "السلة (" + cart.length + ")" : "السلة";
}

// ═══════════════════════════════════════════
// CART
// ═══════════════════════════════════════════
function renderCart() {
  var el = document.getElementById("cart-content");
  el.innerHTML = "";

  if (cart.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-msg">السلة فارغة</div><div class="empty-sub">أضف أصناف من القائمة</div></div>';
    return;
  }

  var total = 0;
  for (var i = 0; i < cart.length; i++) {
    var item = cart[i];
    total += item.price * item.qty;
    var row = document.createElement("div");
    row.className = "cart-item";

    var img = document.createElement("img");
    img.src = item.img; img.alt = item.name;
    img.style.cssText = "width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:#0a0600;";
    img.onerror = function() { this.style.display = "none"; };
    row.appendChild(img);

    var inf = document.createElement("div"); inf.style.flex = "1"; inf.style.minWidth = "0";
    inf.innerHTML = '<div class="item-name">' + item.name + '</div>'
                  + '<div style="color:#d4a017;font-weight:800;font-size:14px;margin-top:4px">' + item.price + '×' + item.qty + ' = ' + (item.price * item.qty) + ' ريال</div>';
    row.appendChild(inf);

    var del = document.createElement("button");
    del.className = "del-btn"; del.textContent = "🗑️";
    (function(itemId) { del.onclick = function() { removeItemFully(itemId); }; })(item.id);
    row.appendChild(del);
    el.appendChild(row);
  }

  var totalBox = document.createElement("div"); totalBox.className = "total-box";
  totalBox.innerHTML = '<div class="total-row"><span>عدد الأصناف</span><span>' + cart.length + '</span></div>'
                     + '<div class="total-row"><span>الإجمالي</span><span class="total-big">' + total + ' ريال</span></div>';
  el.appendChild(totalBox);

  var cfm = document.createElement("button"); cfm.className = "confirm-btn"; cfm.textContent = "✅ تأكيد الطلب";
  cfm.onclick = function() { confirmOrder(); };
  el.appendChild(cfm);
}

function confirmOrder() {
  if (cart.length === 0) return;
  var total = 0;
  for (var i = 0; i < cart.length; i++) total += cart[i].price * cart[i].qty;
  var orders = loadOrders();
  var s = loadSettings();
  var prefix = s.tablePrefix || "طاولة";
  orders.unshift({
    id: Date.now(),
    tableId: currentTable,
    items: JSON.parse(JSON.stringify(cart)),
    status: "pending",
    by: "customer",
    at: new Date().toLocaleTimeString("ar-SA", { hour: "2-digit", minute: "2-digit" }),
    total: total
  });
  saveOrders(orders);
  cart = [];
  renderCart();
  renderItems();
  renderOrders();
  switchTab(2);
  showToast("✅ تم إرسال طلبك!");
}

// ═══════════════════════════════════════════
// MY ORDERS
// ═══════════════════════════════════════════
function getBadgeHTML(status) {
  var map = {
    pending:   { cls: "b-pending",   txt: "في الانتظار"  },
    preparing: { cls: "b-preparing", txt: "قيد التحضير" },
    ready:     { cls: "b-ready",     txt: "جاهز ✅"      },
    delivered: { cls: "b-delivered", txt: "تم التسليم"   }
  };
  var s = map[status] || map.pending;
  return '<span class="order-badge ' + s.cls + '">' + s.txt + '</span>';
}

function renderOrders() {
  var el = document.getElementById("orders-content");
  var orders = loadOrders().filter(function(o) { return o.tableId === currentTable; });

  if (orders.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-msg">لا طلبات بعد</div><div class="empty-sub">اطلب من القائمة وتابع هنا</div></div>';
    document.getElementById("tab2").textContent = "طلباتي";
    return;
  }

  document.getElementById("tab2").textContent = "طلباتي (" + orders.length + ")";
  var borderColors = { pending:"#f59e0b", preparing:"#3b82f6", ready:"#10b981", delivered:"#6b7280" };
  var html = "";
  for (var i = 0; i < orders.length; i++) {
    var o = orders[i];
    var bc = borderColors[o.status] || "#f59e0b";
    var chips = "";
    for (var j = 0; j < o.items.length; j++) {
      chips += '<span class="chip">' + o.items[j].emoji + ' ' + o.items[j].name + ' ×' + o.items[j].qty + '</span>';
    }
    html += '<div class="order-card" style="background:rgba(255,255,255,.04);border:1px solid ' + bc + '28;">'
         +  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
         +    getBadgeHTML(o.status)
         +    '<div style="text-align:right;color:#5a4020;font-size:12px">·' + o.at + '</div>'
         +  '</div>'
         +  '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">' + chips + '</div>'
         +  '<div style="color:#d4a017;font-weight:800;font-size:16px">' + o.total + ' ريال</div>'
         + '</div>';
  }
  el.innerHTML = html;
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function switchTab(n) {
  currentTab = n;
  for (var i = 0; i <= 2; i++) {
    var tabBtn = document.getElementById("tab" + i);
    var view   = document.getElementById("view" + i);
    if (tabBtn) tabBtn.classList.toggle("on", i === n);
    if (view) {
      if (i === n) { view.style.display = (n === 0) ? "flex" : "block"; }
      else         { view.style.display = "none"; }
    }
  }
  if (n === 1) renderCart();
  if (n === 2) renderOrders();
}

// ═══════════════════════════════════════════
// AUTO REFRESH ORDERS
// ═══════════════════════════════════════════
setInterval(function() {
  if (currentTab === 2) renderOrders();
}, 4000);

  var s  = loadSettings();
  var cn = s.cafeName || "شاهي قمرا";
  document.getElementById("cafe-title").textContent = cn;
})();
</script>
