<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#d4a017">
<title>شاهي قمرا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#fef9ef;--bg2:#fdf3d8;--bg3:#faecc6;
  --card:#ffffff;--card2:#fffdf5;
  --bd:#e2ce96;--bd2:#ecdda8;
  --tx:#1a0800;--tx2:#6b4c18;--tx3:#9a7a38;--tx4:#c4a860;
  --ac:#d4a017;--ac2:#b8890f;
  --ac-bg:rgba(212,160,23,.11);--ac-bd:rgba(212,160,23,.32);
  --shadow:0 2px 16px rgba(180,130,0,.10);
  --shadow-lg:0 6px 32px rgba(180,130,0,.15);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;direction:rtl;background:var(--bg);color:var(--tx);min-height:100vh;padding-bottom:90px;}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:'Cairo',sans-serif;outline:none;}
::-webkit-scrollbar{height:3px;width:3px;}
::-webkit-scrollbar-thumb{background:var(--bd);}

/* ── HEADER ── */
.hdr{
  position:sticky;top:0;z-index:500;
  background:var(--card);border-bottom:1px solid var(--bd);
  padding:0 16px;display:flex;align-items:center;gap:10px;height:58px;
  box-shadow:var(--shadow);
}
.hdr-logo{font-size:28px;user-select:none;}
.hdr-title{flex:1;font-weight:900;font-size:18px;color:var(--ac);}
.hdr-sub{font-size:11px;color:var(--tx3);font-weight:600;}
.cart-btn{
  position:relative;background:var(--ac-bg);border:1.5px solid var(--ac-bd);
  border-radius:14px;padding:7px 13px;display:flex;align-items:center;gap:6px;
  color:var(--ac);font-weight:800;font-size:14px;
}
.cart-badge{
  position:absolute;top:-6px;right:-6px;background:var(--ac);color:#fff;
  border-radius:50%;width:19px;height:19px;font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--card);
}

/* ── CATEGORY TABS ── */
.cat-scroll{
  background:var(--card);border-bottom:1px solid var(--bd);
  display:flex;overflow-x:auto;padding:0 12px;gap:4px;
  position:sticky;top:58px;z-index:499;
  -webkit-overflow-scrolling:touch;
}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-tab{
  flex-shrink:0;padding:10px 14px;border:none;background:none;
  border-bottom:2.5px solid transparent;font-weight:700;font-size:13px;
  color:var(--tx3);white-space:nowrap;transition:all .15s;
}
.cat-tab.on{color:var(--ac);border-bottom-color:var(--ac);}

/* ── MENU GRID ── */
.section-title{
  padding:16px 16px 10px;font-size:16px;font-weight:900;color:var(--tx2);
  border-bottom:1px solid var(--bd2);margin-bottom:2px;
}
.menu-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 12px 4px;
}
.menu-card{
  background:var(--card);border:1px solid var(--bd2);border-radius:16px;
  overflow:hidden;cursor:pointer;box-shadow:var(--shadow);
  transition:transform .15s,box-shadow .15s;
  display:flex;flex-direction:column;
}
.menu-card:active{transform:scale(.97);box-shadow:none;}
.menu-card-img{
  width:100%;aspect-ratio:1/1;object-fit:cover;display:block;
  background:var(--bg2);
}
.menu-card-body{padding:10px 10px 12px;flex:1;display:flex;flex-direction:column;gap:4px;}
.menu-card-name{font-size:13px;font-weight:800;color:var(--tx);line-height:1.3;}
.menu-card-price{font-size:13px;font-weight:900;color:var(--ac);}
.menu-card-add{
  margin-top:auto;background:var(--ac);border:none;border-radius:10px;
  padding:6px 0;color:#fff;font-weight:800;font-size:13px;width:100%;
}
.inactive-badge{
  display:inline-block;background:rgba(239,68,68,.1);color:#ef4444;
  border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:2px 6px;font-size:10px;
}

/* ── MODALS / BOTTOM SHEETS ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:800;
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(3px);
}
.overlay.on{display:flex;}
.sheet{
  background:var(--card);border-radius:24px 24px 0 0;
  width:100%;max-width:520px;max-height:92vh;
  overflow-y:auto;animation:sheetUp .26s ease;
  -webkit-overflow-scrolling:touch;
}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pill{width:38px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;}
.sheet-body{padding:16px 18px 36px;}

/* ── ITEM DETAIL SHEET ── */
.item-img-big{
  width:100%;aspect-ratio:16/10;object-fit:cover;
  border-radius:16px;margin-bottom:14px;background:var(--bg2);
}
.item-name-big{font-size:20px;font-weight:900;color:var(--tx);margin-bottom:4px;}
.item-price-big{font-size:17px;font-weight:900;color:var(--ac);margin-bottom:16px;}

/* variant/option sections */
.opt-section{margin-bottom:16px;}
.opt-title{
  font-size:13px;font-weight:800;color:var(--tx2);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.opt-badge{
  font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;
}
.req-badge{background:rgba(239,68,68,.1);color:#ef4444;}
.opt-badge-opt{background:var(--ac-bg);color:var(--ac);}

/* variant pills */
.var-grid{display:flex;flex-wrap:wrap;gap:8px;}
.var-pill{
  border:1.5px solid var(--bd);border-radius:12px;padding:7px 14px;
  font-size:13px;font-weight:700;color:var(--tx2);background:var(--card2);
  cursor:pointer;transition:all .14s;
}
.var-pill.on{background:var(--ac);border-color:var(--ac);color:#fff;}

/* extra options */
.extra-grid{display:flex;flex-wrap:wrap;gap:8px;}
.extra-chip{
  border:1.5px solid var(--bd);border-radius:12px;padding:7px 14px;
  font-size:13px;font-weight:700;color:var(--tx2);background:var(--card2);
  cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .14s;
}
.extra-chip.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac2);}

/* qty */
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.qty-btn{
  width:38px;height:38px;border-radius:10px;font-size:20px;
  display:flex;align-items:center;justify-content:center;font-weight:700;
}
.qty-minus{background:var(--bg2);border:1px solid var(--bd);color:var(--tx2);}
.qty-plus{background:var(--ac);color:#fff;}
.qty-num{font-size:20px;font-weight:900;color:var(--tx);min-width:28px;text-align:center;}

/* note */
.note-input{
  width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:10px 12px;font-size:14px;color:var(--tx);resize:none;height:60px;
  margin-bottom:16px;
}

/* add to cart btn */
.add-cart-btn{
  width:100%;background:var(--ac);border-radius:14px;padding:14px 0;
  color:#fff;font-weight:900;font-size:16px;box-shadow:0 4px 18px rgba(212,160,23,.35);
}

/* ── CART SHEET ── */
.cart-item-row{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 0;border-bottom:1px solid var(--bd2);
}
.cart-item-img{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg2);}
.cart-item-info{flex:1;}
.cart-item-name{font-size:14px;font-weight:800;color:var(--tx);}
.cart-item-sub{font-size:11px;color:var(--tx3);margin-top:2px;line-height:1.5;}
.cart-item-price{font-size:14px;font-weight:900;color:var(--ac);margin-top:4px;}
.cart-del{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:5px 8px;color:#ef4444;font-size:13px;}

/* totals */
.total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px;color:var(--tx3);}
.total-grand{font-size:20px;font-weight:900;color:var(--tx);border-top:2px solid var(--bd);padding-top:10px;margin-top:4px;}

/* table selector */
.tbl-select{
  width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;
  padding:10px 12px;font-size:15px;color:var(--tx);margin-bottom:12px;
}
.order-btn{
  width:100%;background:linear-gradient(135deg,#b8890f,#d4a017,#f0c030);
  border-radius:14px;padding:15px 0;color:#fff;font-weight:900;font-size:17px;
  box-shadow:0 5px 22px rgba(212,160,23,.4);
}

/* ── FLOATING CART BAR ── */
#cart-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  background:var(--card);border-top:1px solid var(--bd);
  padding:10px 16px 20px;display:none;
  box-shadow:0 -4px 24px rgba(180,130,0,.12);
}
.cart-bar-inner{
  background:var(--ac);border-radius:14px;padding:12px 18px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;
  box-shadow:0 4px 18px rgba(212,160,23,.35);
}
.cart-bar-label{color:#fff;font-weight:800;font-size:15px;}
.cart-bar-total{color:rgba(255,255,255,.9);font-size:14px;font-weight:700;}

/* ── TOAST ── */
#toast-wrap{position:fixed;top:70px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:10px 16px;border-radius:12px;font-size:14px;max-width:280px;animation:sheetUp .25s ease;box-shadow:var(--shadow-lg);}
.toast-ok{background:#ecfdf5;border:1px solid #10b981;color:#065f46;}
.toast-err{background:#fef2f2;border:1px solid #ef4444;color:#991b1b;}

/* ── ADMIN ── */
.admin-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
  display:none;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(4px);
}
.admin-overlay.on{display:flex;}
.admin-sheet{
  background:var(--card);border-radius:24px 24px 0 0;
  width:100%;max-width:520px;height:90vh;
  display:flex;flex-direction:column;animation:sheetUp .26s ease;
}
.admin-hdr{
  padding:14px 18px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.admin-tabs{
  display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;
  background:var(--bg2);
}
.admin-tab{
  flex:1;padding:10px 0;background:none;border:none;border-bottom:2px solid transparent;
  font-weight:700;font-size:12px;color:var(--tx3);
}
.admin-tab.on{color:var(--ac);border-bottom-color:var(--ac);}
.admin-body{flex:1;overflow-y:auto;padding:14px;}

/* admin form */
.afield{margin-bottom:12px;}
.afield label{font-size:12px;font-weight:700;color:var(--tx3);display:block;margin-bottom:4px;}
.ainput{
  width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;
  padding:9px 12px;font-size:14px;color:var(--tx);
}
.ainput:focus{border-color:var(--ac-bd);}
.aselect{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;font-size:14px;color:var(--tx);}
.abtn{border-radius:10px;padding:10px 18px;font-weight:800;font-size:14px;}
.abtn-ac{background:var(--ac);color:#fff;}
.abtn-del{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);color:#ef4444;}
.abtn-sm{padding:5px 12px;font-size:12px;border-radius:8px;}
.item-row-admin{
  background:var(--card2);border:1px solid var(--bd2);border-radius:12px;
  padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;
}
.item-row-admin img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--bg2);}

/* password modal */
.pwd-modal{
  position:fixed;inset:0;z-index:1100;background:rgba(0,0,0,.6);
  display:none;align-items:center;justify-content:center;padding:24px;
  backdrop-filter:blur(5px);
}
.pwd-modal.on{display:flex;}
.pwd-card{
  background:var(--card);border-radius:20px;padding:28px 24px;
  width:100%;max-width:340px;box-shadow:var(--shadow-lg);
}

/* confirmation */
.confirm-overlay{position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:24px;}
.confirm-overlay.on{display:flex;}
.confirm-card{background:var(--card);border-radius:20px;padding:28px 24px;width:100%;max-width:320px;text-align:center;}
</style>
</head>
<body>
<div id="toast-wrap"></div>

<!-- ════════════ HEADER ════════════ -->
<div class="hdr">
  <div class="hdr-logo" id="logo-tap" onclick="logoTap()">🌙</div>
  <div style="flex:1">
    <div class="hdr-title" id="hdr-cafe">شاهي قمرا</div>
    <div class="hdr-sub">اختر ما يشتهيك 🍵</div>
  </div>
  <button class="cart-btn" onclick="openCart()">
    🛒 <span id="cart-count-hdr">0</span>
    <span class="cart-badge" id="cart-badge" style="display:none">0</span>
  </button>
</div>

<!-- ════════════ CATEGORIES ════════════ -->
<div class="cat-scroll" id="cat-scroll"></div>

<!-- ════════════ MENU BODY ════════════ -->
<div id="menu-body"></div>

<!-- ════════════ CART BAR ════════════ -->
<div id="cart-bar">
  <div class="cart-bar-inner" onclick="openCart()">
    <span class="cart-bar-label">🛒 عرض السلة</span>
    <div>
      <span id="cb-count" class="cart-bar-total"></span>
      <span id="cb-total" style="color:#fff;font-weight:900;font-size:16px;margin-right:8px"></span>
    </div>
  </div>
</div>

<!-- ════════════ ITEM DETAIL SHEET ════════════ -->
<div class="overlay" id="item-ov" onclick="if(event.target===this)closeItem()">
  <div class="sheet" id="item-sheet">
    <div class="pill"></div>
    <div class="sheet-body" id="item-body"></div>
  </div>
</div>

<!-- ════════════ CART SHEET ════════════ -->
<div class="overlay" id="cart-ov" onclick="if(event.target===this)closeCart()">
  <div class="sheet">
    <div class="pill"></div>
    <div class="sheet-body">
      <h3 style="color:var(--ac);margin-bottom:16px;font-size:17px">🛒 سلة الطلبات</h3>
      <div id="cart-items"></div>
      <div id="cart-totals" style="margin-top:8px"></div>
      <div id="cart-actions"></div>
    </div>
  </div>
</div>

<!-- ════════════ SUCCESS SHEET ════════════ -->
<div class="overlay" id="success-ov">
  <div class="sheet">
    <div class="pill"></div>
    <div class="sheet-body" style="text-align:center;padding-top:24px">
      <div style="font-size:64px;margin-bottom:12px">🎉</div>
      <h2 style="color:var(--ac);font-size:22px;font-weight:900;margin-bottom:8px">تم إرسال طلبك!</h2>
      <p style="color:var(--tx3);font-size:14px;margin-bottom:24px">سيصلك طلبك قريباً إن شاء الله 🌙</p>
      <button onclick="closeSuccess()" class="add-cart-btn">حسناً شكراً! 👍</button>
    </div>
  </div>
</div>

<!-- ════════════ PASSWORD MODAL ════════════ -->
<div class="pwd-modal" id="pwd-modal">
  <div class="pwd-card">
    <div style="text-align:center;font-size:40px;margin-bottom:10px">🔐</div>
    <h3 style="text-align:center;color:var(--ac);margin-bottom:4px">لوحة الإدارة</h3>
    <p style="text-align:center;color:var(--tx3);font-size:12px;margin-bottom:18px">أدخل كلمة المرور للمتابعة</p>
    <input id="pwd-input" type="password" class="ainput" placeholder="••••••" style="text-align:center;font-size:22px;letter-spacing:6px;margin-bottom:12px" oninput="pwdErr('')">
    <div id="pwd-err" style="color:#ef4444;font-size:12px;text-align:center;margin-bottom:10px;min-height:18px"></div>
    <button class="abtn abtn-ac" style="width:100%;margin-bottom:8px" onclick="checkPwd()">دخول ←</button>
    <button class="abtn" style="width:100%;background:var(--bg2);color:var(--tx3)" onclick="closePwd()">إلغاء</button>
  </div>
</div>

<!-- ════════════ ADMIN SHEET ════════════ -->
<div class="admin-overlay" id="admin-ov" onclick="if(event.target===this)closeAdmin()">
  <div class="admin-sheet">
    <div class="admin-hdr">
      <div>
        <div style="font-weight:900;font-size:16px;color:var(--ac)">⚙️ لوحة الإدارة</div>
        <div style="font-size:11px;color:var(--tx3)">إدارة المنيو والإعدادات</div>
      </div>
      <button onclick="closeAdmin()" style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:6px 14px;color:var(--tx3);font-size:13px">✕ إغلاق</button>
    </div>
    <div class="admin-tabs" id="admin-tabs"></div>
    <div class="admin-body" id="admin-body"></div>
  </div>
</div>

<!-- ════════════ CONFIRM ════════════ -->
<div class="confirm-overlay" id="confirm-ov">
  <div class="confirm-card">
    <div style="font-size:40px;margin-bottom:10px" id="conf-icon">⚠️</div>
    <p id="conf-msg" style="color:var(--tx);font-weight:700;margin-bottom:20px"></p>
    <div style="display:flex;gap:10px">
      <button id="conf-ok" style="flex:1;background:#ef4444;color:#fff;border-radius:10px;padding:10px 0;font-weight:800">تأكيد</button>
      <button onclick="closeConfirm()" style="flex:1;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:10px 0;color:var(--tx3);font-weight:700">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

var db = null, FB_OK = false;
(function(){
  if(FIREBASE_CONFIG.apiKey==="YOUR_API_KEY") return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    FB_OK = true;
    // Live menu sync
    db.collection("menu").onSnapshot(function(snap){
      if(!snap.empty){
        var fm=[];
        snap.forEach(function(d){ fm.push(Object.assign({},d.data(),{id:d.id})); });
        if(fm.length){ MENU=fm; buildPage(); }
      }
    });
    // Live option groups sync
    db.collection("optionGroups").onSnapshot(function(snap){
      if(!snap.empty){
        var og=[];
        snap.forEach(function(d){ og.push(Object.assign({},d.data(),{id:d.id})); });
        if(og.length) OPT_GROUPS=og;
      }
    });
    // Settings sync
    db.collection("settings").doc("cafe").onSnapshot(function(doc){
      if(doc.exists){
        var d=doc.data();
        if(d.cafeName){S.cn=d.cafeName; setSafe("hdr-cafe",S.cn);}
        if(d.tableCount) S.tc=d.tableCount;
        if(d.tablePrefix) S.tp=d.tablePrefix;
        if(d.adminPwd) S.adminPwd=d.adminPwd;
      }
    });
  } catch(e){}
})();

// ══════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════
var S = {tc:10, tp:"طاولة", cn:"شاهي قمرا", adminPwd:"1234"};
(function(){
  try{
    var ls = JSON.parse(localStorage.getItem("qamra_settings")||"{}");
    if(ls.tableCount) S.tc=ls.tableCount;
    if(ls.tablePrefix) S.tp=ls.tablePrefix;
    if(ls.cafeName){S.cn=ls.cafeName; setSafe("hdr-cafe",S.cn);}
    if(ls.adminPwd) S.adminPwd=ls.adminPwd;
  } catch(e){}
})();
function saveS(obj){
  try{
    var ls=JSON.parse(localStorage.getItem("qamra_settings")||"{}");
    Object.assign(ls,obj);
    localStorage.setItem("qamra_settings",JSON.stringify(ls));
  } catch(e){}
  if(FB_OK&&db) db.collection("settings").doc("cafe").set(obj,{merge:true}).catch(function(){});
}

// ══════════════════════════════════════════════
// OPTION GROUPS

var cart = [];
// Each cart item: {uid, itemId, name, emoji, img, price, qty, variantName, extras, note}

function cartTotal(){
  return cart.reduce(function(s,i){ return s + i.price * i.qty; },0);
}
function cartCount(){
  return cart.reduce(function(s,i){ return s + i.qty; },0);
}
function updateCartUI(){
  var cnt = cartCount();
  setSafe("cart-count-hdr", cnt);
  var badge = document.getElementById("cart-badge");
  if(badge){ badge.textContent=cnt; badge.style.display=cnt>0?"flex":"none"; }
  var bar = document.getElementById("cart-bar");
  if(bar) bar.style.display = cnt>0?"block":"none";
  setSafe("cb-count", cnt+" صنف");
  setSafe("cb-total", cartTotal()+" ريال");
}

// ══════════════════════════════════════════════
// BUILD PAGE
// ══════════════════════════════════════════════
var activeCat = "الكل";
function getCategories(){
  var cats=["الكل"];
  MENU.forEach(function(m){
    if(m.active!==false && cats.indexOf(m.cat)<0) cats.push(m.cat);
  });
  return cats;
}

function buildPage(){
  var cats = getCategories();
  // Category tabs
  document.getElementById("cat-scroll").innerHTML = cats.map(function(c){
    return '<button class="cat-tab'+(c===activeCat?" on":"")+'" onclick="setcat(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</button>';
  }).join("");

  // Menu body
  var body = document.getElementById("menu-body");
  var sections = "";
  var toShow = cats.filter(function(c){ return c!=="الكل"; });

  toShow.forEach(function(cat){
    var items = MENU.filter(function(m){
      return m.cat===cat && (activeCat==="الكل"||activeCat===cat);
    });
    if(activeCat!=="الكل" && activeCat!==cat) return;
    if(!items.length) return;
    sections += '<div id="sec-'+encodeId(cat)+'"><div class="section-title">'+cat+'</div><div class="menu-grid">';
    items.forEach(function(item){
      var inactive = item.active===false;
      sections += '<div class="menu-card'+(inactive?" inactive-card":"")+'" onclick="'+(inactive?"":("openItem("+JSON.stringify(item).replace(/"/g,"&quot;")+")"))+'" style="'+(inactive?"opacity:.55;cursor:default;":"")+'">'+
        '<img class="menu-card-img" src="'+item.img+'" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' width=\\\'1\\\' height=\\\'1\\\'></svg>\'">'+
        '<div class="menu-card-body">'+
          '<div class="menu-card-name">'+item.emoji+' '+item.name+'</div>'+
          '<div class="menu-card-price">'+(item.variants&&item.variants.length?"من ":"")+item.price+' ريال</div>'+
          (!inactive?'<button class="menu-card-add" onclick="event.stopPropagation();openItem('+JSON.stringify(item).replace(/"/g,"&quot;")+')" >إضافة +</button>':'<span class="inactive-badge">غير متاح</span>')+
        '</div></div>';
    });
    sections += '</div></div>';
  });

  body.innerHTML = sections || '<div style="text-align:center;padding:60px 24px;color:var(--tx3)">لا أصناف في هذا التصنيف</div>';
  updateCartUI();
}

function setcat(c){
  activeCat=c;
  document.querySelectorAll(".cat-tab").forEach(function(el){
    el.classList.toggle("on",el.textContent===c);
  });
  // scroll to section or rebuild
  if(c==="الكل"){ buildPage(); window.scrollTo({top:0,behavior:"smooth"}); return; }
  buildPage();
  setTimeout(function(){
    var sec=document.getElementById("sec-"+encodeId(c));
    if(sec) sec.scrollIntoView({behavior:"smooth",block:"start"});
  },50);
}
function encodeId(s){ return s.replace(/\s/g,"_").replace(/[^a-zA-Z0-9_\u0600-\u06FF]/g,""); }

// ══════════════════════════════════════════════
// ITEM DETAIL
// ══════════════════════════════════════════════
var curItem=null, curVariantIdx=0, curExtras={}, curQty=1;

function openItem(item){
  curItem=item;
  curVariantIdx = (item.variants&&item.variants.length)? 0 : -1;
  curExtras={};
  curQty=1;
  renderItemSheet();
  document.getElementById("item-ov").classList.add("on");
}
function closeItem(){ document.getElementById("item-ov").classList.remove("on"); }

function getItemPrice(){
  if(!curItem) return 0;
  var base = curVariantIdx>=0 && curItem.variants && curItem.variants[curVariantIdx]
    ? curItem.variants[curVariantIdx].p
    : curItem.price;
  // add extras price
  var extraCost = 0;
  Object.keys(curExtras).forEach(function(gid){
    var grp = OPT_GROUPS.find(function(g){ return g.id===gid; });
    if(!grp) return;
    (curExtras[gid]||[]).forEach(function(oid){
      var opt = grp.options.find(function(o){ return o.id===oid; });
      if(opt&&opt.price) extraCost+=opt.price;
    });
  });
  return base + extraCost;
}

function renderItemSheet(){
  if(!curItem) return;
  var item=curItem;
  var price=getItemPrice();
  var groups=(item.optionGroupIds||[]).map(function(gid){
    return OPT_GROUPS.find(function(g){ return g.id===gid; });
  }).filter(Boolean);

  var html='<img class="item-img-big" src="'+item.img+'" onerror="this.style.display=\'none\'">';
  html+='<div class="item-name-big">'+item.emoji+' '+item.name+'</div>';
  html+='<div class="item-price-big" id="item-cur-price">'+price+' ريال</div>';

  // Variants
  if(item.variants&&item.variants.length){
    html+='<div class="opt-section"><div class="opt-title">الحجم <span class="opt-badge req-badge">مطلوب</span></div><div class="var-grid">';
    item.variants.forEach(function(v,i){
      html+='<button class="var-pill'+(i===curVariantIdx?" on":"")+'" onclick="selVar('+i+')">'+v.n+' — '+v.p+' ر</button>';
    });
    html+='</div></div>';
  }

  // Option groups
  groups.forEach(function(grp){
    var isSingle=grp.type==="single";
    html+='<div class="opt-section"><div class="opt-title">'+grp.name+
      ' <span class="opt-badge opt-badge-opt">'+(isSingle?"اختياري":"متعدد")+'</span></div>';
    html+='<div class="extra-grid">';
    grp.options.forEach(function(opt){
      var sel=(curExtras[grp.id]||[]).indexOf(opt.id)>=0;
      html+='<button class="extra-chip'+(sel?" on":"")+'" onclick="togExtra(\''+grp.id+'\',\''+opt.id+'\','+(isSingle?"true":"false")+')">'+
        (sel?"✓ ":"")+opt.name+(opt.price?(' +'+opt.price+' ر'):"")+'</button>';
    });
    html+='</div></div>';
  });

  // Note
  html+='<textarea class="note-input" id="item-note" placeholder="ملاحظة خاصة... (اختياري)"></textarea>';

  // Qty
  html+='<div class="qty-row">';
  html+='<button class="qty-btn qty-minus" onclick="adjQty(-1)">−</button>';
  html+='<span class="qty-num" id="item-qty">'+curQty+'</span>';
  html+='<button class="qty-btn qty-plus" onclick="adjQty(1)">+</button>';
  html+='<span style="color:var(--tx3);font-size:13px;margin-right:8px">العدد</span>';
  html+='</div>';

  // Add button
  html+='<button class="add-cart-btn" id="add-btn" onclick="addToCart()">إضافة للسلة — <span id="add-price">'+price*curQty+'</span> ريال</button>';

  document.getElementById("item-body").innerHTML=html;
}

function selVar(i){
  curVariantIdx=i;
  updateItemPriceUI();
  document.querySelectorAll(".var-pill").forEach(function(el,idx){ el.classList.toggle("on",idx===i); });
}
function togExtra(gid, oid, single){
  if(!curExtras[gid]) curExtras[gid]=[];
  var arr=curExtras[gid];
  var idx=arr.indexOf(oid);
  if(single){ curExtras[gid]= idx>=0?[]:[oid]; }
  else { if(idx>=0) arr.splice(idx,1); else arr.push(oid); }
  renderItemSheet();
  // restore note
}
function adjQty(d){
  curQty=Math.max(1,curQty+d);
  setSafe("item-qty",curQty);
  var p=getItemPrice();
  setSafe("add-price",p*curQty);
}
function updateItemPriceUI(){
  var p=getItemPrice();
  setSafe("item-cur-price",p+" ريال");
  setSafe("add-price",p*curQty);
}

function addToCart(){
  if(!curItem) return;
  var note = document.getElementById("item-note");
  var noteVal = note ? note.value.trim() : "";
  var price = getItemPrice();
  var varName = (curVariantIdx>=0 && curItem.variants && curItem.variants[curVariantIdx])
    ? curItem.variants[curVariantIdx].n : "";

  // build extras label
  var extraLabels=[];
  Object.keys(curExtras).forEach(function(gid){
    var grp=OPT_GROUPS.find(function(g){ return g.id===gid; });
    if(!grp) return;
    (curExtras[gid]||[]).forEach(function(oid){
      var o=grp.options.find(function(x){ return x.id===oid; });
      if(o) extraLabels.push(o.name);
    });
  });

  var uid = Date.now()+"_"+Math.random().toString(36).slice(2,6);
  cart.push({
    uid:uid, itemId:curItem.id, name:curItem.name,
    emoji:curItem.emoji, img:curItem.img,
    price:price, qty:curQty,
    variantName:varName,
    extras:Object.assign({},curExtras),
    extraLabels:extraLabels,
    note:noteVal
  });

  closeItem();
  updateCartUI();
  toast("✅ أُضيف للسلة", true);
}

// CART SHEET
// ══════════════════════════════════════════════
function openCart(){
  if(!cart.length){ toast("السلة فارغة!", false); return; }
  renderCartSheet();
  document.getElementById("cart-ov").classList.add("on");
}
function closeCart(){ document.getElementById("cart-ov").classList.remove("on"); }

function renderCartSheet(){
  if(!cart.length){ closeCart(); return; }
  var sub=cartTotal(), tax=Math.round(sub*.15*100)/100, grand=sub+tax;

  // Items
  var html=cart.map(function(ci){
    var sub2=ci.price*ci.qty;
    var details=[ci.variantName].concat(ci.extraLabels||[]).filter(Boolean).join(" · ");
    return '<div class="cart-item-row">'
      +'<img class="cart-item-img" src="'+ci.img+'" onerror="this.style.display=\'none\'">'
      +'<div class="cart-item-info">'
        +'<div class="cart-item-name">'+ci.emoji+' '+ci.name+'</div>'
        +(details?'<div class="cart-item-sub">'+details+'</div>':"")
        +(ci.note?'<div class="cart-item-sub">📝 '+ci.note+'</div>':"")
        +'<div class="cart-item-price">'+sub2+' ريال × '+ci.qty+'</div>'
      +'</div>'
      +'<button class="cart-del" onclick="removeCart(\''+ci.uid+'\')">🗑</button>'
    +'</div>';
  }).join("");
  document.getElementById("cart-items").innerHTML=html;

  // Totals
  document.getElementById("cart-totals").innerHTML=
    '<div class="total-row"><span>المجموع</span><span>'+sub+' ريال</span></div>'

(function(){

})();

function removeCart(uid){
  cart=cart.filter(function(c){ return c.uid!==uid; });
  updateCartUI();
  if(!cart.length){ closeCart(); } else { renderCartSheet(); }
}

function sendOrder(){
  var tbl=document.getElementById("cart-tbl");
  var tid=tbl?parseInt(tbl.value)||0:_tableId;
  if(!tid){ toast("اختر رقم الطاولة أولاً",false); return; }
  var total=cartTotal();
  var at=new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"});
  var items=cart.map(function(ci){
    return {
      id:ci.itemId, name:ci.name, emoji:ci.emoji, price:ci.price, qty:ci.qty,
      variantName:ci.variantName, extras:ci.extras, extraLabels:ci.extraLabels||[], note:ci.note,
      display:ci.name+(ci.variantName?" ("+ci.variantName+")":"")
    };
  });
  if(FB_OK&&db){
    db.collection("orders").add({
      tableId:tid, items:items, status:"pending", by:"customer",
      at:at, total:total, createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){
      cart=[]; _tableId=0; updateCartUI(); closeCart();
      document.getElementById("success-ov").classList.add("on");
    }).catch(function(e){ toast("خطأ: "+e.message,false); });
  } else {
    var o={id:Date.now(),tableId:tid,items:items,status:"pending",by:"customer",at:at,total:total};
    try{ var ls=JSON.parse(localStorage.getItem("qamra_orders")||"[]"); ls.unshift(o); localStorage.setItem("qamra_orders",JSON.stringify(ls)); } catch(e){}
    cart=[]; _tableId=0; updateCartUI(); closeCart();
    document.getElementById("success-ov").classList.add("on");
  }
}
function closeSuccess(){ document.getElementById("success-ov").classList.remove("on"); }

function saveItemForm(){
  var name=document.getElementById("if-name").value.trim();
  var price=parseFloat(document.getElementById("if-price").value)||0;
  var emoji=document.getElementById("if-emoji").value.trim()||"🍽️";

  var active=document.getElementById("if-active").checked;
  if(!name||!price){ toast("أدخل الاسم والسعر",false); return; }

  var variants=[];
  if(varsStr){ varsStr.split(",").forEach(function(v){ var p=v.split("="); if(p.length===2) variants.push({n:p[0].trim(),p:parseFloat(p[1].trim())||0}); }); }

  var optGroupIds=OPT_GROUPS.map(function(g){ return g.id; }).filter(function(gid){
    var cb=document.getElementById("og-"+gid);
    return cb && cb.checked;
  });

  var data={name:name,price:price,emoji:emoji,cat:cat,img:img,active:active,
            variants:variants,optionGroupIds:optGroupIds};

  if(FB_OK&&db){
    var ref=editingItemId?db.collection("menu").doc(String(editingItemId)):db.collection("menu").doc();
    ref.set(data,{merge:true}).then(function(){ toast("✅ تم الحفظ",true); document.getElementById("item-form-area").innerHTML=""; }).catch(function(e){ toast("خطأ: "+e.message,false); });
  } else {
    data.id=editingItemId||(MENU.reduce(function(m,x){ return Math.max(m,parseInt(x.id)||0); },0)+1);
    var idx=MENU.findIndex(function(m){ return String(m.id)===String(data.id); });

    toast("✅ تم الحفظ (محلياً)",true);
    document.getElementById("item-form-area").innerHTML="";
    renderAdminItems();
    buildPage();
  }
}

function saveGroupForm(){
  var name=document.getElementById("gf-name").value.trim();
  var type=document.getElementById("gf-type").value;
  var optsRaw=document.getElementById("gf-opts").value.trim();
  if(!name||!optsRaw){ toast("أكمل الحقول",false); return; }
  var options=optsRaw.split(",").map(function(o){
    var p=o.trim().split("=");
    var n=p[0].trim(), pr=p[1]?parseFloat(p[1].trim())||0:0;
    var id=n.replace(/\s+/g,"_").replace(/[^a-zA-Z0-9_\u0600-\u06FF]/g,"").toLowerCase()||("opt"+Date.now());
    return {id:id,name:n,price:pr||undefined};
  }).filter(function(o){ return o.name; });
  if(!options.length){ toast("أضف خياراً واحداً على الأقل",false); return; }
  var gid=editingGroupId||(name.replace(/\s+/g,"_").toLowerCase()+"_"+Date.now());
  var data={id:gid,name:name,type:type,required:false,options:options};

  if(FB_OK&&db){
    db.collection("optionGroups").doc(gid).set(data).then(function(){ toast("✅ تم الحفظ",true); document.getElementById("group-form-area").innerHTML=""; }).catch(function(e){ toast("خطأ",false); });
  } else {
    var idx=OPT_GROUPS.findIndex(function(g){ return g.id===gid; });
    if(idx>=0) OPT_GROUPS[idx]=data; else OPT_GROUPS.push(data);
    toast("✅ تم الحفظ",true); document.getElementById("group-form-area").innerHTML=""; renderAdminGroups();
  }
}

    OPT_GROUPS=OPT_GROUPS.filter(function(g){ return g.id!==gid; });
    toast("🗑️ تم الحذف",true); renderAdminGroups();
  });
}

function setSafe(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }

function toast(m,ok){
  var d=document.createElement("div");
  d.className="toast "+(ok?"toast-ok":"toast-err");
  d.textContent=m;
  document.getElementById("toast-wrap").appendChild(d);
  setTimeout(function(){ if(d.parentNode) d.parentNode.removeChild(d); },3000);
}

function confirm2(msg,cb){
  setSafe("conf-msg",msg);
  document.getElementById("conf-ok").onclick=function(){ closeConfirm(); cb(); };
  document.getElementById("confirm-ov").classList.add("on");
}
function closeConfirm(){ document.getElementById("confirm-ov").classList.remove("on"); }
