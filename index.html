<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#fef8ee">
<title id="pg-t">شاهي قمرا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;direction:rtl;background:#fef8ee;color:#1a0a00;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;}
h1{font-size:32px;font-weight:900;color:#c8860a;margin:8px 0 5px;}
.sub{color:#a07030;font-size:13px;margin-bottom:44px;}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px;}
.card{border-radius:18px;padding:20px 22px;display:flex;align-items:center;gap:16px;text-decoration:none;border:none;cursor:pointer;font-family:'Cairo',sans-serif;width:100%;transition:transform .15s,box-shadow .15s;}
.card:active{transform:scale(.97);}
.card-c{background:linear-gradient(135deg,#c8860a,#e8a820);box-shadow:0 6px 22px rgba(200,134,10,.35);}
.card-k{background:#fff;border:1.5px solid #e8d8a0;box-shadow:0 2px 12px rgba(150,90,0,.08);}
.card-a{background:#fff;border:1.5px solid #e8d8a0;box-shadow:0 2px 12px rgba(150,90,0,.08);}
.ico{font-size:36px;flex-shrink:0;}
.txt{text-align:right;}
.txt h2{font-size:17px;font-weight:800;margin:0 0 3px;}
.txt p{font-size:12px;margin:0;opacity:.75;}
.card-c .txt h2,.card-c .txt p{color:#fff;}
.card-k .txt h2,.card-a .txt h2{color:#1a0a00;}
.card-k .txt p,.card-a .txt p{color:#a07030;}
/* PIN OVERLAY */
#pin-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:24px;}
#pin-ov.on{display:flex;}
.pin-box{background:#fff;border-radius:20px;padding:26px;width:100%;max-width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15);}
.pin-inp{width:100%;background:#fef3dd;border:1.5px solid #e8d8a0;border-radius:10px;padding:13px;color:#1a0a00;font-size:22px;letter-spacing:8px;text-align:center;margin:14px 0 8px;font-family:'Cairo',sans-serif;}
.pin-inp:focus{border-color:#c8860a;outline:none;}
.pin-err{color:#dc2626;font-size:13px;min-height:16px;margin-bottom:10px;}
.pin-go{width:100%;background:#c8860a;border:none;border-radius:12px;padding:13px;color:#fff;font-weight:800;font-size:15px;margin-bottom:8px;cursor:pointer;font-family:'Cairo',sans-serif;}
.pin-go:active{transform:scale(.98);}
.pin-cancel{width:100%;background:none;border:none;color:#a07030;font-size:13px;text-decoration:underline;cursor:pointer;font-family:'Cairo',sans-serif;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>
</head>
<body>

<!-- PIN OVERLAY -->
<div id="pin-ov" onclick="if(event.target===this)closePin()">
  <div class="pin-box" id="pin-box">
    <div style="font-size:34px">🔐</div>
    <h3 style="color:#c8860a;font-weight:800;font-size:17px;margin-top:6px">رمز الإدارة</h3>
    <input id="pin-inp" class="pin-inp" type="password" inputmode="numeric" maxlength="6" placeholder="••••"
      autocomplete="off" onkeydown="if(event.key==='Enter')checkPin()">
    <div id="pin-err" class="pin-err"></div>
    <button class="pin-go" onclick="checkPin()">دخول</button>
    <button class="pin-cancel" onclick="closePin()">إلغاء</button>
  </div>
</div>

<div style="font-size:66px;filter:drop-shadow(0 0 18px rgba(200,134,10,.3));margin-bottom:6px" id="logo">🌙</div>
<h1 id="cafe-name">شاهي قمرا</h1>
<p class="sub" id="cafe-sub">فطورك وسهرتك عندنا!</p>

<div class="cards">
  <a href="customer.html" class="card card-c">
    <span class="ico">📱</span>
    <div class="txt"><h2>قائمة الطلبات</h2><p>اطلب من هنا</p></div>
  </a>

  <a href="kitchen.html" class="card card-k">
    <span class="ico">🍳</span>
    <div class="txt"><h2>شاشة المطبخ</h2><p>استقبال وتحضير الطلبات</p></div>
  </a>

  <button onclick="openPin()" class="card card-a">
    <span class="ico">⚙️</span>
    <div class="txt"><h2>الإدارة</h2><p>🔐 محمي برمز سري</p></div>
  </button>
</div>

<script>
var PIN = localStorage.getItem("qamra_pin") || "1234";

// Apply saved settings
(function(){
  try {
    var s = JSON.parse(localStorage.getItem("qamra_s") || "{}");
    if (s.cn) { document.getElementById("cafe-name").textContent = s.cn; document.getElementById("pg-t").textContent = s.cn; }
    if (s.sub) document.getElementById("cafe-sub").textContent = s.sub;
    if (s.logo) document.getElementById("logo").textContent = s.logo;
  } catch(e) {}
})();

function openPin() {
  PIN = localStorage.getItem("qamra_pin") || "1234";
  document.getElementById("pin-inp").value = "";
  document.getElementById("pin-err").textContent = "";
  document.getElementById("pin-ov").classList.add("on");
  setTimeout(() => document.getElementById("pin-inp").focus(), 250);
}
function closePin() { document.getElementById("pin-ov").classList.remove("on"); }
function checkPin() {
  var v = document.getElementById("pin-inp").value;
  if (v === PIN) { closePin(); window.location.href = "admin.html"; }
  else {
    document.getElementById("pin-err").textContent = "رمز خاطئ";
    var box = document.getElementById("pin-box");
    box.style.animation = "shake .3s ease";
    setTimeout(() => box.style.animation = "", 400);
    document.getElementById("pin-inp").value = "";
    document.getElementById("pin-inp").focus();
  }
}

  // PWA Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
</script>
</body>
</html>
