<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>لوحة التحكم — الإعدادات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0800;--ac:#d4a017;--tx:#f0e8cc;--card:rgba(255,255,255,.04);--bd:rgba(212,160,23,.3);}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--tx);margin:0;padding:20px;}
.container{max-width:600px;margin:0 auto;}
h1{text-align:center;color:var(--ac);}
.sec{background:var(--card);border:1px solid var(--bd);border-radius:15px;padding:20px;margin-bottom:20px;}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;}
input, select{background:#1a1a1a;border:1px solid var(--bd);color:#fff;padding:8px;border-radius:8px;width:60%;}
.btn{background:var(--ac);color:#000;border:none;padding:12px;border-radius:10px;width:100%;font-weight:bold;cursor:pointer;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.theme-btn{padding:10px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,.05);color:white;cursor:pointer;text-align:center;}
.theme-btn.active{border-color:var(--ac);background:var(--ac);color:black;}
</style>
</head>
<body>
<div class="container">
    <h1>⚙️ الإعدادات الرئيسية</h1>
    
    <div class="sec">
        <h3>🎨 تصميم المتجر (للعملاء)</h3>
        <p style="font-size:12px;opacity:0.7">اختر الثيم الذي سيظهر للعملاء:</p>
        <div class="theme-grid" id="themes">
            <div class="theme-btn" onclick="setTheme('dark')">الوضع الداكن</div>
            <div class="theme-btn" onclick="setTheme('light')">الوضع الفاتح</div>
            <div class="theme-btn" onclick="setTheme('gold')">الملكي الذهبي</div>
            <div class="theme-btn" onclick="setTheme('lavender')">لافندر</div>
        </div>
    </div>

    <div class="sec">
        <h3>🏪 معلومات المقهى</h3>
        <div class="row">
            <span>اسم المقهى:</span>
            <input type="text" id="cafeName" oninput="saveSettings()">
        </div>
        <div class="row">
            <span>عدد الطاولات:</span>
            <input type="number" id="tableCount" oninput="saveSettings()">
        </div>
        <div class="row">
            <span>نوع الخط:</span>
            <select id="fontFamily" onchange="saveSettings()">
                <option value="Cairo">Cairo</option>
                <option value="Tajawal">Tajawal</option>
                <option value="Amiri">Amiri</option>
            </select>
        </div>
    </div>
    
    <button class="btn" onclick="alert('تم حفظ الإعدادات بنجاح!')">حفظ الكل</button>
</div>

<script>
let S = JSON.parse(localStorage.getItem('cafeSettings')) || {
    theme: 'dark',
    cn: 'شاهي قمرا',
    tc: 10,
    font: 'Cairo'
};

function init() {
    document.getElementById('cafeName').value = S.cn;
    document.getElementById('tableCount').value = S.tc;
    document.getElementById('fontFamily').value = S.font;
    updateActiveTheme();
}

function setTheme(t) {
    S.theme = t;
    saveSettings();
    updateActiveTheme();
}

function updateActiveTheme() {
    document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.remove('active');
        if(btn.innerText.includes(S.theme === 'dark' ? 'الداكن' : S.theme === 'light' ? 'الفاتح' : S.theme === 'gold' ? 'الذهبي' : 'لافندر')) {
            btn.classList.add('active');
        }
    });
}

function saveSettings() {
    S.cn = document.getElementById('cafeName').value;
    S.tc = document.getElementById('tableCount').value;
    S.font = document.getElementById('fontFamily').value;
    localStorage.setItem('cafeSettings', JSON.stringify(S));
}

init();
</script>
</body>
</html>
