body{font-family:'Cairo',sans-serif;direction:rtl;min-height:100vh;}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;outline:none;}
input,select{font-family:'Cairo',sans-serif;outline:none;}
.scr{display:none;flex-direction:column;min-height:100vh;}.scr.on{display:flex;}
.fscr{display:none;flex-direction:column;height:100vh;}.fscr.on{display:flex;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:#2a1a00;}
.hdr{padding:13px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back{border:none;border-radius:8px;padding:6px 12px;font-size:15px;cursor:pointer;}
.tabs{display:flex;flex-shrink:0;}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;font-weight:700;font-size:12px;}
.badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.sp{background:rgba(245,158,11,.14);color:#f59e0b;border:1px solid #f59e0b40;}
.sr{background:rgba(59,130,246,.14);color:#3b82f6;border:1px solid #3b82f640;}
.sg{background:rgba(16,185,129,.14);color:#10b981;border:1px solid #10b98140;}
.sd{background:rgba(107,114,128,.12);color:#6b7280;border:1px solid #6b728040;}
.empty{text-align:center;padding:48px 24px;}
.chip{border-radius:8px;padding:3px 10px;font-size:12px;}
#toast-l{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:10px 18px;border-radius:10px;font-size:14px;max-width:280px;text-align:right;animation:si .3s ease;}
@keyframes si{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;width:100%;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;}
</style>
</head>

let S={tc:10,tp:"طاولة",cn:"شاهي قمرا",ac:"#d4a017",mode:"auto"};
function loadS(){const s=gs();S.tc=s.tableCount||10;S.tp=s.tablePrefix||"طاولة";S.cn=s.cafeName||"شاهي قمرا";S.ac=s.accent||"#d4a017";S.mode=s.themeMode||"auto";}

// ── THEME ─────────────────────────────────────
const isDark=()=>{if(S.mode==="dark")return true;if(S.mode==="light")return false;return window.matchMedia("(prefers-color-scheme: dark)").matches;};
function T(){const d=isDark(),ac=S.ac;
  return d?{bg:"#0d0800",bgH:"#0a0600",sf:"rgba(255,255,255,.035)",sfH:"rgba(255,255,255,.07)",bd:"#1e1400",bds:"#150f00",tx:"#f0e8cc",txS:"#a08040",txM:"#5a4020",txF:"#342010",ac,acBg:`${ac}1a`,acBd:`${ac}38`,dark:1}
  :{bg:"#fef9ef",bgH:"#fdf3d8",sf:"rgba(0,0,0,.028)",sfH:"rgba(0,0,0,.056)",bd:"#e2ce96",bds:"#ecdda8",tx:"#1a0800",txS:"#6b4c18",txM:"#9a7a38",txF:"#c4a860",ac,acBg:`${ac}1a`,acBd:`${ac}40`,dark:0};}

function applyTheme(){
  const t=T();
  document.body.style.background=t.bg;
  document.body.style.color=t.tx;
}

// ── NAV ──────────────────────────────────────
function nav(id){
  document.querySelectorAll(".scr,.fscr").forEach(s=>{s.classList.remove("on");s.style.display="none";});
  const el=document.getElementById(id);if(el){el.classList.add("on");el.style.display="flex";}
}

// ── TOAST ────────────────────────────────────
function toast(m,ok){
  const t=T();const d=document.createElement("div");d.className="toast";d.textContent=m;
  d.style.background=ok?(t.dark?"#064e3b":"#d1fae5"):(t.dark?"#1c1200":"#fffbeb");
  d.style.border=`1px solid ${ok?"#10b981":t.ac}`;
  d.style.color=ok?(t.dark?"#6ee7b7":"#065f46"):(t.dark?t.ac:t.ac);
  d.style.boxShadow=t.dark?"0 4px 20px rgba(0,0,0,.5)":"0 4px 16px rgba(0,0,0,.1)";
  document.getElementById("toast-l").appendChild(d);setTimeout(()=>d.remove(),3500);
}

// ── ORDERS helpers ────────────────────────────
const BDG={pending:`<span class="badge sp">في الانتظار</span>`,preparing:`<span class="badge sr">قيد التحضير</span>`,
  ready:`<span class="badge sg">جاهز ✅</span>`,delivered:`<span class="badge sd">تم التسليم</span>`};
function updOrd(id,status){
  const orders=go_();const idx=orders.findIndex(o=>o.id===id);
  if(idx>=0){orders[idx].status=status;so(orders);}
  const lb={preparing:"قيد التحضير 👨‍🍳",ready:"جاهز للتسليم ✅",delivered:"تم التسليم 🎉"};
  toast(lb[status]||status,status==="delivered");
}
function placeOrder(tid,items,by){
  const orders=go_();
  orders.unshift({id:Date.now(),tableId:tid,items,status:"pending",by,
    at:new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"}),
    total:items.reduce((s,i)=>s+i.price*i.qty,0)});
  so(orders);toast("✅ تم إرسال الطلب للمطبخ",true);
}

  ];
  document.getElementById("home-body").innerHTML=`
    <div style="font-size:60px;filter:drop-shadow(0 0 18px ${t.ac}60)">🌙</div>
    <h1 style="font-size:32px;font-weight:900;color:${t.ac};margin:8px 0 4px">${S.cn}</h1>
    <p style="color:${t.txS};font-size:14px;margin-bottom:36px">لوحة تحكم المحل</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:480px">
      ${roles.map(r=>`<button onclick="openRole('${r.id}')" style="background:${r.c}15;border:1px solid ${r.c}35;border-radius:16px;padding:18px 14px;cursor:pointer;text-align:right;display:flex;flex-direction:column;gap:7px;transition:all .18s" onmouseenter="this.style.background='${r.c}25'" onmouseleave="this.style.background='${r.c}15'">
        <span style="font-size:30px">${r.e}</span>
        <span style="color:${r.c};font-weight:800;font-size:14px">${r.l}</span>
        <span style="color:${t.txF};font-size:11px">${r.d}</span>
      </button>`).join("")}
    </div>`;
}

function openRole(role){
  if(role==="waiter")  buildWaiter();
  if(role==="kitchen") buildKitchen();
  if(role==="admin")   buildAdmin();
  if(role==="settings")buildSettings();
  nav("s-"+role);
}

// ── WAITER ───────────────────────────────────
let wTab=0,wSel=null,wCart=[],wCat="الكل";

function buildWaiter(){
  const t=T();
  // header
  document.getElementById("w-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t.sfH};color:${t.txS}">←</button>
    <span style="font-size:15px">🌙</span>
    <span style="color:${t.ac};font-weight:800;font-size:16px">شاشة النادل 👨‍🍳</span>
    <span style="margin-right:auto;color:${t.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("w-hdr").style.cssText+=`background:${t.bgH};border-bottom:1px solid ${t.bd}`;
  // tabs
  document.getElementById("w-tabs").style.cssText=`background:${t.bgH};border-bottom:1px solid ${t.bd}`;
  setWTab(0);
}

function setWTab(n){
  wTab=n;
  const t=T();const labels=["الطاولات 🪑","طلب جديد ➕","نشطة"];
  document.getElementById("w-tabs").innerHTML=labels.map((l,i)=>`<button class="tab${n===i?" on":""}" onclick="setWTab(${i})" style="color:${n===i?"#3b82f6":T().txF};border-bottom-color:${n===i?"#3b82f6":"transparent"}">${l}</button>`).join("");
  [0,1,2].forEach(i=>{
    const el=document.getElementById(`w-tc${i}`);
    if(el)el.style.display=i===n?(n===0?"flex":"block"):"none";
  });
  if(n===0)renderWTables();
  if(n===1)renderWOrder();
  if(n===2)renderWActive();
}

function renderWTables(){
  const t=T();const orders=go_().filter(o=>o.status!=="delivered");
  const TABLES=Array.from({length:S.tc},(_,i)=>i+1);
  document.getElementById("w-tc0").style.cssText=`display:flex;flex-direction:column;flex:1;overflow:hidden;`;
  document.getElementById("w-tc0").innerHTML=`<div class="scroll" style="padding:14px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
    ${TABLES.map(id=>{
      const tords=orders.filter(o=>o.tableId===id);const busy=tords.length>0;
      return `<button onclick="wSel=${id};setWTab(1);renderWOrder()" style="background:${busy?"rgba(59,130,246,.1)":t.sf};border:1px solid ${busy?"#3b82f6":t.bd};border-radius:14px;padding:16px;text-align:right;transition:all .15s">
        <div style="font-size:26px;margin-bottom:6px">${busy?"🔴":"🟢"}</div>
        <div style="color:${busy?"#93c5fd":t.tx};font-weight:800;font-size:15px">${S.tp} ${id}</div>
        <div style="color:${busy?"#3b82f6":t.txF};font-size:12px;margin-top:4px">${busy?`${tords.length} طلب نشط`:"متاحة"}</div>
      </button>`;
    }).join("")}
  </div></div>`;
}

function renderWOrder(){

    <span style="color:${t.txS};font-size:13px">الطاولة:</span>
    <select id="w-sel" onchange="wSel=Number(this.value)" style="background:${t.sf};border:1px solid ${t.bd};border-radius:8px;color:${t.tx};padding:6px 10px;font-size:13px">
      <option value="">اختر طاولة</option>
      ${TABLES.map(i=>`<option value="${i}" ${wSel===i?"selected":""}>${S.tp} ${i}</option>`).join("")}
    </select>
    <span id="w-cart-tot" style="margin-right:auto;color:${t.ac};font-weight:700"></span>
  </div>
  <div style="display:flex;gap:8px;padding:10px 14px;overflow-x:auto;background:${t.bgH};border-bottom:1px solid ${t.bd};flex-shrink:0">
    ${CATS.map(c=>`<button onclick="wCat='${c}';renderWOrder()" style="background:${wCat===c?"#3b82f6":"rgba(59,130,246,.1)"};border:none;border-radius:20px;padding:5px 12px;color:${wCat===c?"#fff":"#3b82f6"};font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0">${c}</button>`).join("")}
  </div>
  <div class="scroll"><div style="padding:14px 14px 0;display:flex;flex-direction:column;gap:8px">
    ${(wCat==="الكل"?MENU:MENU.filter(m=>m.cat===wCat)).map(item=>{
      const q=wCart.find(i=>i.id===item.id)?.qty||0;
      return `<div style="background:${t.sf};border:1px solid ${t.bd};border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px">
        <img src="${item.img}" style="width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'">
        <div style="flex:1"><div style="color:${t.tx};font-weight:700;font-size:14px">${item.name}</div><div style="color:${t.ac};font-weight:800;font-size:13px">${item.price} ريال</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${q>0?`<button onclick="wCQ(${item.id},-1)" style="width:28px;height:28px;background:${t.sfH};border:1px solid ${t.bd};border-radius:7px;color:${t.tx};font-size:15px;display:flex;align-items:center;justify-content:center">−</button><span style="color:#3b82f6;font-weight:900;min-width:18px;text-align:center">${q}</span>`:""}
          <button onclick="wCQ(${item.id},1)" style="width:28px;height:28px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:7px;color:#3b82f6;font-size:15px;display:flex;align-items:center;justify-content:center">+</button>
        </div>
      </div>`;
    }).join("")}
    <div style="height:80px"></div>
  </div></div>`;
  document.getElementById("w-tc1").innerHTML=html;
  // sticky send btn
  const tot=wCart.reduce((s,i)=>s+i.price*i.qty,0);
  const ti=document.getElementById("w-cart-tot");if(ti)ti.textContent=wCart.length?`السلة: ${tot} ريال`:"";
  if(wCart.length>0&&wSel){
    const fl=document.createElement("div");
    fl.style.cssText=`position:sticky;bottom:0;padding:12px 14px;background:linear-gradient(0deg,${t.bg} 70%,transparent);flex-shrink:0`;
    fl.innerHTML=`<button onclick="wSend()" style="width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:14px;padding:14px 0;color:#fff;font-weight:800;font-size:16px">✅ إرسال للمطبخ — ${tot} ريال</button>`;
    document.getElementById("w-tc1").appendChild(fl);
  }
}

function wCQ(id,d){
  const item=MENU.find(m=>m.id===id);const idx=wCart.findIndex(i=>i.id===id);
  if(idx>=0){wCart[idx].qty+=d;if(wCart[idx].qty<=0)wCart.splice(idx,1);}
  else if(d>0)wCart.push({...item,qty:1});
  renderWOrder();
}
function wSend(){if(!wSel||!wCart.length)return;placeOrder(wSel,wCart,"waiter");wCart=[];wSel=null;setWTab(0);}

function renderWActive(){
  const t=T();const orders=go_().filter(o=>o.status!=="delivered");
  const el=document.getElementById("w-tc2");
  if(!orders.length){el.innerHTML=`<div class="empty"><div style="font-size:52px">✅</div><div style="color:${t.txM};font-weight:700;margin-top:12px">لا طلبات نشطة</div></div>`;return;}
  el.innerHTML=orders.map(o=>orderCard(o,t,true)).join("");
}

function orderCard(o,t,showAct){
  const bc={pending:"#f59e0b",preparing:"#3b82f6",ready:"#10b981",delivered:"#6b7280"};
  const actBtn=showAct&&o.status==="ready"?`<button onclick="updOrd(${o.id},'delivered');renderWActive()" style="background:#4a1942;border:none;border-radius:10px;padding:8px 16px;color:#e879f9;font-weight:700;font-size:13px">🎉 تم التسليم</button>`:"";
  return `<div style="background:${t.sf};border:1px solid ${(bc[o.status]||"#f59e0b")}28;border-radius:14px;padding:14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      ${BDG[o.status]||BDG.pending}
      <div style="text-align:right"><span style="color:${t.tx};font-weight:700">طاولة ${o.tableId}</span><span style="color:${t.txM};font-size:12px;margin-right:8px">#${String(o.id).slice(-4)}·${o.at}</span></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
      ${o.items.map(i=>`<span class="chip" style="background:${t.acBg};border:1px solid ${t.acBd};color:${t.txS}">${i.emoji} ${i.name} ×${i.qty}</span>`).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:${t.ac};font-weight:800;font-size:16px">${o.total} ريال</span>
      ${actBtn}
    </div>
  </div>`;
}

// ── KITCHEN ───────────────────────────────────
let kFlt="pending";
function buildKitchen(){
  const t=T();
  document.getElementById("k-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t.sfH};color:${t.txS}">←</button>
    <span>🌙</span><span style="color:${t.ac};font-weight:800;font-size:16px">شاشة المطبخ 🍳</span>
    <span style="margin-right:auto;color:${t.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("k-hdr").style.cssText+=`background:${t.bgH};border-bottom:1px solid ${t.bd}`;
  renderKitchen();
}

function renderKitchen(){
  const t=T();const orders=go_();
  const pn=orders.filter(o=>o.status==="pending").length;
  const rn=orders.filter(o=>o.status==="preparing").length;
  document.getElementById("k-stats").style.cssText=`display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid ${t.bd};background:${t.bgH};flex-shrink:0`;
  document.getElementById("k-stats").innerHTML=[
    {l:"انتظار",c:pn,col:"#f59e0b"},{l:"تحضير",c:rn,col:"#3b82f6"},{l:"الكل",c:orders.length,col:"#10b981"}
  ].map(s=>`<div style="flex:1;background:${s.col}14;border:1px solid ${s.col}30;border-radius:10px;padding:8px 0;text-align:center"><div style="color:${s.col};font-weight:900;font-size:22px">${s.c}</div><div style="color:${s.col}99;font-size:11px">${s.l}</div></div>`).join("");
  document.getElementById("k-filters").style.cssText=`display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid ${t.bd};background:${t.bgH};flex-shrink:0`;
  document.getElementById("k-filters").innerHTML=[{v:"pending",l:"⏳ انتظار"},{v:"preparing",l:"👨‍🍳 تحضير"},{v:"all",l:"📋 الكل"}].map(f=>`<button onclick="kFlt='${f.v}';renderKitchen()" style="background:${kFlt===f.v?"#065f46":"rgba(16,185,129,.08)"};border:1px solid ${kFlt===f.v?"#10b981":"transparent"};border-radius:20px;padding:6px 14px;color:${kFlt===f.v?"#6ee7b7":"#10b981"};font-weight:700;font-size:12px">${f.l}</button>`).join("");
  const shown=orders.filter(o=>kFlt==="all"?o.status!=="delivered":o.status===kFlt);
  const el=document.getElementById("k-list");
  if(!shown.length){el.innerHTML=`<div class="empty"><div style="font-size:52px">✅</div><div style="color:${t.txM};font-weight:700;margin-top:12px">لا طلبات</div></div>`;return;}
  el.innerHTML=shown.map(o=>{
    const act=o.status==="pending"?`<button onclick="updOrd(${o.id},'preparing');renderKitchen()" style="flex:1;background:#1e3a8a;border:none;border-radius:10px;padding:9px 0;color:#93c5fd;font-weight:700;font-size:13px">👨‍🍳 بدء التحضير</button>`
      :o.status==="preparing"?`<button onclick="updOrd(${o.id},'ready');renderKitchen()" style="flex:1;background:#064e3b;border:none;border-radius:10px;padding:9px 0;color:#6ee7b7;font-weight:700;font-size:13px">✅ جاهز</button>`
      :o.status==="ready"?`<button onclick="updOrd(${o.id},'delivered');renderKitchen()" style="flex:1;background:#4a1942;border:none;border-radius:10px;padding:9px 0;color:#e879f9;font-weight:700;font-size:13px">🎉 تم التسليم</button>`:"";
    return `<div style="background:${o.status==="pending"?"rgba(245,158,11,.08)":"rgba(59,130,246,.08)"};border:1px solid ${o.status==="pending"?"#f59e0b30":"#3b82f630"};border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">${BDG[o.status]||BDG.pending}
        <div><span style="color:${t.tx};font-weight:800">طاولة ${o.tableId}</span><span style="color:${t.txM};font-size:12px;margin-right:8px">#${String(o.id).slice(-4)}·${o.at}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px">
        ${o.items.map(i=>`<div style="display:flex;justify-content:space-between;align-items:center"><span style="color:${t.txS};font-size:13px">${i.emoji} ${i.name}</span><span style="background:${t.acBg};color:${t.ac};border-radius:8px;padding:2px 10px;font-weight:700;font-size:13px">×${i.qty}</span></div>`).join("")}
      </div>
      <div style="display:flex;gap:8px">${act}</div>
    </div>`;
  }).join("");
}

// ── ADMIN ────────────────────────────────────
function buildAdmin(){
  const t=T();const orders=go_();
  document.getElementById("a-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t.sfH};color:${t.txS}">←</button>
    <span>🌙</span><span style="color:${t.ac};font-weight:800;font-size:16px">لوحة الإدارة 📊</span>
    <span style="margin-right:auto;color:${t.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("a-hdr").style.cssText+=`background:${t.bgH};border-bottom:1px solid ${t.bd}`;
  const del=orders.filter(o=>o.status==="delivered");
  const rev=del.reduce((s,o)=>s+o.total,0);
  const pend=orders.filter(o=>o.status==="pending").length;
  const freq={};orders.forEach(o=>o.items.forEach(i=>{freq[i.name]=(freq[i.name]||0)+i.qty;}));
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const C=(e,l,v,col)=>`<div style="background:${col}10;border:1px solid ${col}25;border-radius:14px;padding:14px"><div style="font-size:26px;margin-bottom:4px">${e}</div><div style="color:${col};font-weight:900;font-size:22px">${v}</div><div style="color:${col}88;font-size:12px">${l}</div></div>`;
  const el=document.getElementById("a-body");
  el.style.background=t.bg;
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    ${C("📋","إجمالي الطلبات",orders.length,t.ac)}${C("⏳","في الانتظار",pend,"#f59e0b")}${C("✅","تم التسليم",del.length,"#10b981")}${C("💰","الإيرادات",rev+" ريال","#8b5cf6")}
  </div>`;
  if(top.length){html+=`<div style="background:${t.sf};border:1px solid ${t.bd};border-radius:14px;padding:14px;margin-bottom:14px">
    <h3 style="color:${t.ac};margin:0 0 14px;font-size:15px">🔥 الأكثر طلباً</h3>
    ${top.map(([n,q],i)=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:${t.txS};font-size:13px">#${i+1} ${n}</span><span style="color:${t.ac};font-weight:700;font-size:13px">${q}×</span></div>
      <div style="background:${t.bds};border-radius:4px;height:6px;overflow:hidden"><div style="height:100%;background:${t.ac};width:${(q/top[0][1])*100}%;border-radius:4px"></div></div></div>`).join("")}
  </div>`;}
  if(orders.length){html+=`<div style="background:${t.sf};border:1px solid ${t.bd};border-radius:14px;padding:14px">
    <h3 style="color:${t.ac};margin:0 0 12px;font-size:15px">📋 جميع الطلبات</h3>
    ${orders.map(o=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid ${t.bds}">
      ${BDG[o.status]||BDG.pending}
      <div style="text-align:right"><div style="color:${t.tx};font-weight:700;font-size:13px">طاولة ${o.tableId}·#${String(o.id).slice(-4)}</div><div style="color:${t.txM};font-size:11px">${o.at}·${o.by==="waiter"?"نادل":"عميل"}</div></div>
      <span style="color:${t.ac};font-weight:800">${o.total} ريال</span>
    </div>`).join("")}
  </div>`;}
  else html+=`<div class="empty"><div style="font-size:52px">📊</div><div style="color:${t.txM};font-weight:700;margin-top:12px">لا يوجد بيانات بعد</div></div>`;
  el.innerHTML=html;
}

// ── SETTINGS ─────────────────────────────────
const ACCS=[{n:"ذهبي",v:"#d4a017"},{n:"أزرق",v:"#2563eb"},{n:"أخضر",v:"#059669"},{n:"وردي",v:"#db2777"},{n:"بنفسجي",v:"#7c3aed"},{n:"برتقالي",v:"#ea580c"},{n:"تيل",v:"#0891b2"},{n:"أحمر",v:"#dc2626"}];

function buildSettings(){
  const t=T();
  document.getElementById("st-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t.sfH};color:${t.txS}">←</button>
    <span>🌙</span><span style="color:${t.ac};font-weight:800;font-size:16px">⚙️ الإعدادات</span>
    <span style="margin-right:auto;color:${t.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("st-hdr").style.cssText+=`background:${t.bgH};border-bottom:1px solid ${t.bd}`;
  document.getElementById("st-body").style.background=t.bg;

  const sec=(title,ch)=>`<div style="background:${t.sf};border:1px solid ${t.bd};border-radius:16px;overflow:hidden;margin-bottom:14px">
    <div style="padding:11px 16px;border-bottom:1px solid ${t.bds};background:${t.sfH}"><span style="color:${t.txS};font-weight:700;font-size:13px">${title}</span></div>
    <div style="padding:16px">${ch}</div></div>`;
  const row=(l,ch)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid ${t.bds}"><span style="color:${t.tx};font-size:14px">${l}</span>${ch}</div>`;
  const IS=`background:${t.sfH};border:1px solid ${t.bd};border-radius:8px;color:${t.tx};padding:7px 12px;font-size:14px;text-align:right;font-family:'Cairo',sans-serif`;

  document.getElementById("st-body").innerHTML=
    sec("🌓 وضع العرض",`
      <div style="display:flex;gap:8px;margin-bottom:12px">
        ${[{v:"auto",l:"تلقائي 📱"},{v:"dark",l:"داكن 🌙"},{v:"light",l:"فاتح ☀️"}].map(o=>`
          <button onclick="S.mode='${o.v}';ss({themeMode:'${o.v}'});loadS();applyTheme();buildSettings()" style="flex:1;background:${S.mode===o.v?t.acBg:t.sf};border:1.5px solid ${S.mode===o.v?t.ac:t.bd};border-radius:12px;padding:10px 6px;cursor:pointer">
            <div style="color:${S.mode===o.v?t.ac:t.txS};font-weight:800;font-size:13px">${o.l}</div>
          </button>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:${t.acBg};border-radius:10px;border:1px solid ${t.acBd}">
        <span style="font-size:18px">${isDark()?"🌙":"☀️"}</span>
        <span style="color:${t.ac};font-size:13px;font-weight:600">الوضع الحالي: ${isDark()?"داكن":"فاتح"} ${S.mode==="auto"?"(تلقائي)":""}</span>
      </div>`) +
    sec("🎨 لون التمييز",`
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        ${ACCS.map(p=>`<button onclick="S.ac='${p.v}';ss({accent:'${p.v}'});applyTheme();buildSettings()" title="${p.n}" style="width:44px;height:44px;border-radius:50%;background:${p.v};border:3px solid ${S.ac===p.v?t.tx:"transparent"};cursor:pointer;box-shadow:${S.ac===p.v?`0 0 0 2px ${t.bg},0 0 0 4px ${p.v}`:"none"};display:flex;align-items:center;justify-content:center">
          ${S.ac===p.v?`<span style="color:#fff;font-size:16px;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.6)">✓</span>`:""}
        </button>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:${t.txS};font-size:13px">مخصص:</span>
        <input type="color" value="${S.ac}" onchange="S.ac=this.value;ss({accent:this.value});applyTheme();document.getElementById('ac-prev').textContent=this.value" style="width:44px;height:36px;border-radius:8px;border:1px solid ${t.bd};background:${t.sf};cursor:pointer;padding:2px">
        <span id="ac-prev" style="color:${t.txM};font-size:12px;font-family:monospace">${S.ac}</span>
      </div>`) +
    sec("🪑 إعداد الطاولات",`
      ${row("عدد الطاولات",`<div style="display:flex;align-items:center;gap:10px">
        <button onclick="if(S.tc>1){S.tc--;ss({tableCount:S.tc});document.getElementById('tc-n').textContent=S.tc;document.getElementById('tc-slider').value=S.tc;renderTPrev()}" style="width:36px;height:36px;background:${t.sfH};border:1px solid ${t.bd};border-radius:9px;color:${t.txS};font-size:20px;display:flex;align-items:center;justify-content:center">−</button>
        <span id="tc-n" style="color:${t.tx};font-weight:900;font-size:24px;min-width:38px;text-align:center">${S.tc}</span>
        <button onclick="if(S.tc<50){S.tc++;ss({tableCount:S.tc});document.getElementById('tc-n').textContent=S.tc;document.getElementById('tc-slider').value=S.tc;renderTPrev()}" style="width:36px;height:36px;background:${t.acBg};border:1px solid ${t.ac};border-radius:9px;color:${t.ac};font-size:20px;display:flex;align-items:center;justify-content:center">+</button>
      </div>`)}
      <div style="padding:14px 0 6px">
        <input type="range" id="tc-slider" min="1" max="50" value="${S.tc}" oninput="S.tc=Number(this.value);ss({tableCount:S.tc});document.getElementById('tc-n').textContent=S.tc;renderTPrev()" style="accent-color:${t.ac}">
        <div style="display:flex;justify-content:space-between;margin-top:4px"><span style="color:${t.txF};font-size:11px">50</span><span style="color:${t.ac};font-weight:700;font-size:12px" id="tc-lbl">${S.tc} طاولات</span><span style="color:${t.txF};font-size:11px">1</span></div>
      </div>
      ${row("بادئة الاسم",`<input value="${S.tp}" onchange="S.tp=this.value;ss({tablePrefix:this.value});renderTPrev()" style="${IS};width:130px">`)}
      <div id="tprev" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px"></div>`) +
    sec("🏪 معلومات المقهى",`
      ${row("اسم المقهى",`<input value="${S.cn}" onchange="S.cn=this.value;ss({cafeName:this.value})" style="${IS};width:160px">`)}
      <div style="margin-top:12px;padding:12px 16px;background:${t.acBg};border-radius:12px;border:1px solid ${t.acBd};display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">🌙</span><span style="color:${t.ac};font-weight:900;font-size:18px">${S.cn}</span>
      </div>`);
  renderTPrev();
}

function renderTPrev(){
  const t=T();const el=document.getElementById("tprev");if(!el)return;
  const n=Math.min(S.tc,12);
  el.innerHTML=Array.from({length:n},(_,i)=>`<span style="background:${t.acBg};border:1px solid ${t.acBd};border-radius:8px;padding:4px 10px;color:${t.ac};font-size:12px;font-weight:700">${S.tp} ${i+1}</span>`).join("")+(S.tc>12?`<span style="color:${t.txM};font-size:12px;padding:4px 8px">+${S.tc-12} أخرى</span>`:"");
  const lb=document.getElementById("tc-lbl");if(lb)lb.textContent=`${S.tc} طاولات`;
}

// ── AUTO REFRESH ─────────────────────────────
setInterval(()=>{
  const a=document.querySelector(".fscr.on");if(!a)return;
  if(a.id==="s-kitchen")renderKitchen();
  if(a.id==="s-waiter"&&wTab===2)renderWActive();
},4000);

// ── INIT ─────────────────────────────────────
loadS();applyTheme();buildHome();
</script>
</body>
</html>
