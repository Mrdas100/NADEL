<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>شاهي قمرا — Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;700;800&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0d0800;--bg2:#0a0600;--bg3:#070400;--ac:#d4a017;--ac-bg:rgba(212,160,23,.14);--ac-bd:rgba(212,160,23,.3);--tx:#f0e8cc;--tx2:#a08040;--tx3:#5a4020;--tx4:#342010;--card:rgba(255,255,255,.04);--bd:#1e1400;--bd2:#150f00;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo','Noto Sans Bengali',sans-serif;direction:rtl;background:var(--bg);color:var(--tx);min-height:100vh;}
button{font-family:'Cairo','Noto Sans Bengali',sans-serif;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:'Cairo','Noto Sans Bengali',sans-serif;outline:none;}
.scr{display:none;flex-direction:column;}.scr.on{display:flex;}
.fscr{display:none;flex-direction:column;height:100vh;}.fscr.on{display:flex;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);}
.hdr{padding:13px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back{background:rgba(255,255,255,.07);border-radius:8px;color:var(--tx2);padding:6px 12px;font-size:15px;}
.tabs{display:flex;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;font-weight:700;font-size:12px;}
.badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.bp{background:rgba(245,158,11,.14);color:#f59e0b;border:1px solid #f59e0b40;}
.br{background:rgba(59,130,246,.14);color:#3b82f6;border:1px solid #3b82f640;}
.bg{background:rgba(16,185,129,.14);color:#10b981;border:1px solid #10b98140;}
.bd{background:rgba(107,114,128,.12);color:#9ca3af;border:1px solid #9ca3af30;}
.chip{border-radius:8px;padding:3px 10px;font-size:12px;}
.empty{text-align:center;padding:48px 24px;}
#toast-l{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:10px 18px;border-radius:10px;font-size:14px;max-width:280px;text-align:right;animation:si .3s ease;}
@keyframes si{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
.lb{display:flex;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;}
.lbtn{padding:5px 12px;background:var(--card);border:1px solid var(--bd);border-radius:8px;color:var(--tx3);font-size:12px;font-weight:700;}
.lbtn.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac);}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ac);}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;background:var(--bg);}
.login-card{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:28px;width:100%;max-width:380px;}
.linput{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;color:var(--tx);font-size:15px;margin-bottom:12px;direction:ltr;}
.linput::placeholder{color:var(--tx4);direction:rtl;text-align:right;}
.linput:focus{border-color:var(--ac-bd);}
.lbig{width:100%;background:var(--ac);border:none;border-radius:12px;padding:14px 0;color:#fff;font-weight:800;font-size:16px;margin-top:4px;box-shadow:0 4px 18px var(--ac-bg);}
.lerr{color:#f87171;font-size:13px;text-align:center;margin-top:8px;min-height:20px;}
.spin{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
/* MODALS */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8000;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);}
.modal-ov.on{display:flex;}
.modal-sh{background:var(--bg2);border:1px solid var(--bd);border-radius:24px 24px 0 0;width:100%;max-width:520px;animation:su .28s ease;max-height:90vh;overflow-y:auto;}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mpill{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:12px auto 0;}
.mbody{padding:16px 20px 32px;}
.mfield{margin-bottom:14px;}
.mfield label{color:var(--tx2);font-size:12px;font-weight:700;display:block;margin-bottom:5px;}
.mfield input,.mfield select,.mfield textarea{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:9px 12px;color:var(--tx);font-size:14px;}
.mfield textarea{resize:none;height:60px;}
.msave{width:100%;background:var(--ac);border:none;border-radius:12px;padding:13px 0;color:#fff;font-weight:800;font-size:15px;margin-top:8px;}
.mdel{width:100%;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:11px 0;color:#f87171;font-weight:700;font-size:14px;margin-top:8px;}
/* MENU CMS */
.menu-item-row{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mi-img{width:46px;height:46px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg3);}
/* QR */
.qr-wrap{background:#fff;border-radius:12px;padding:16px;display:inline-block;}
/* RECEIPT PRINT */
@media print{body *{visibility:hidden}#print-area *{visibility:visible}#print-area{position:fixed;top:0;left:0;width:100%;background:#fff;padding:20px;color:#000;direction:rtl;}}
</style>
</head>
<body>
<div id="toast-l"></div>
<div id="print-area" style="display:none"></div>

<!-- ══ LOGIN ══ -->
<div id="s-login" class="scr on">
  <div class="login-wrap">
    <div style="font-size:56px;margin-bottom:10px;filter:drop-shadow(0 0 16px var(--ac-bg))">🌙</div>
    <h1 style="color:var(--ac);font-size:26px;font-weight:900;margin:0 0 4px" id="l-cafe-name">شاهي قمرا</h1>
    <p style="color:var(--tx2);font-size:13px;margin-bottom:28px">دخول الموظفين</p>
    <div class="login-card">
      <div class="lb" style="border-radius:10px;margin-bottom:16px;border:none;padding:0">
        <button class="lbtn on" id="lb-ar" onclick="setLang('ar')">العربية</button>
        <button class="lbtn" id="lb-en" onclick="setLang('en')">English</button>
        <button class="lbtn" id="lb-bn" onclick="setLang('bn')" style="font-family:'Noto Sans Bengali',sans-serif">বাংলা</button>
      </div>
      <input id="l-email" class="linput" type="email" placeholder="البريد الإلكتروني">
      <input id="l-pass" class="linput" type="password" placeholder="كلمة المرور">
      <button id="l-btn" class="lbig" onclick="doLogin()">🔐 دخول</button>
      <div id="l-err" class="lerr"></div>
      <div style="border-top:1px solid var(--bd);margin-top:16px;padding-top:14px;text-align:center">
        <p style="color:var(--tx3);font-size:12px;margin-bottom:8px">أول مرة؟ أنشئ حساب مدير</p>
        <button onclick="showReg()" style="background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:8px 16px;color:var(--tx2);font-size:13px">➕ إنشاء حساب</button>
      </div>
      <div id="reg-form" style="display:none;margin-top:14px;border-top:1px solid var(--bd);padding-top:14px">
        <input id="r-name" class="linput" type="text" placeholder="الاسم">
        <select id="r-role" style="width:100%;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:11px 14px;color:var(--tx);font-size:14px;margin-bottom:12px">
          <option value="admin">مدير (Admin)</option>
          <option value="waiter">نادل (Waiter)</option>
          <option value="kitchen">مطبخ (Kitchen)</option>
        </select>
        <button class="lbig" onclick="doRegister()" style="background:#3b82f6">✅ إنشاء الحساب</button>
      </div>
    </div>
    <div id="l-fb-warn" style="margin-top:20px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:12px 16px;max-width:380px;width:100%;display:none">
      <p style="color:#f59e0b;font-size:12px;font-weight:700;margin-bottom:6px">⚠️ Firebase غير مضبوط</p>
      <p style="color:var(--tx3);font-size:11px">عدّل FIREBASE_CONFIG في أعلى الملف لتفعيل المزامنة الحية والمصادقة. يعمل الآن بوضع محلي (localStorage).</p>
      <button onclick="skipLogin()" style="background:var(--ac);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px;margin-top:10px">متابعة بدون Firebase →</button>
    </div>
  </div>
</div>

<!-- ══ HOME ══ -->
<div id="s-home" class="scr" style="min-height:100vh;">
  <div style="background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;justify-content:space-between;align-items:center">
    <div class="lb" style="padding:0;border:none;background:none">
      <button class="lbtn on" id="hb-ar" onclick="setLang('ar')">العربية</button>
      <button class="lbtn" id="hb-en" onclick="setLang('en')">English</button>
      <button class="lbtn" id="hb-bn" onclick="setLang('bn')" style="font-family:'Noto Sans Bengali',sans-serif">বাংলা</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="user-badge" style="color:var(--tx3);font-size:12px"></span>
      <button onclick="doLogout()" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:5px 10px;color:#f87171;font-size:12px">خروج</button>
    </div>
  </div>
  <div id="home-body" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;"></div>
</div>

<!-- ══ WAITER ══ -->
<div id="s-waiter" class="fscr">
  <div class="hdr" id="w-hdr"></div>
  <div class="lb" id="w-lb"></div>
  <div class="tabs" id="w-tabs"></div>
  <div id="w-tc0" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
  <div id="w-tc1" class="scroll" style="display:none;"></div>
  <div id="w-tc2" class="scroll" style="display:none;padding:14px;"></div>
</div>

<!-- ══ KITCHEN ══ -->
<div id="s-kitchen" class="fscr">
  <div class="hdr" id="k-hdr"></div>
  <div class="lb" id="k-lb"></div>
  <div id="k-stats" style="display:flex;gap:10px;padding:12px 14px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);"></div>
  <div id="k-filters" style="display:flex;gap:8px;padding:10px 14px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bd);"></div>
  <div class="scroll" id="k-list" style="padding:14px;"></div>
</div>

<!-- ══ ADMIN ══ -->
<div id="s-admin" class="fscr">
  <div class="hdr" id="a-hdr"></div>
  <div class="lb" id="a-lb"></div>
  <div class="tabs" id="a-tabs" style="background:var(--bg2);border-bottom:1px solid var(--bd);"></div>
  <div id="a-v0" class="scroll" style="display:none;padding:14px;"></div>
  <div id="a-v1" class="scroll" style="display:none;padding:14px;"></div>
  <div id="a-v2" class="scroll" style="display:none;padding:14px;"></div>
  <div id="a-v3" class="scroll" style="display:none;padding:14px;"></div>
  <div id="a-v4" class="scroll" style="display:none;padding:14px;"></div>
  <div id="a-v5" class="scroll" style="display:none;padding:14px;"></div>
</div>

<!-- ══ MENU ITEM MODAL ══ -->
<div id="mi-ov" class="modal-ov" onclick="if(event.target===this)closeMenuModal()">
  <div class="modal-sh">
    <div class="mpill"></div>
    <div class="mbody">
      <h3 id="mi-title" style="color:var(--ac);margin-bottom:16px;font-size:16px">إضافة صنف</h3>
      <input type="hidden" id="mi-id">
      <div class="mfield"><label>اسم الصنف (عربي)</label><input id="mi-name" type="text" placeholder="مثال: شاهي قمرا"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="mfield"><label>السعر (ريال)</label><input id="mi-price" type="number" placeholder="10"></div>
        <div class="mfield"><label>الترتيب</label><input id="mi-order" type="number" placeholder="0"></div>
      </div>
      <div class="mfield">
        <label>التصنيف</label>
        <select id="mi-cat">
          <option>سمبوسة</option><option>المناقيش</option><option>الحلى</option><option>خلية قمرا</option><option>الفطائر</option><option>المشروبات الساخنة</option><option>المقرمشات</option><option>القهوة</option><option>المشروبات الباردة</option><option>ترامس سفري</option><option>الالعاب وحجز المباريات</option>
        </select>
      </div>
      <div class="mfield"><label>الإيموجي</label><input id="mi-emoji" type="text" placeholder="🍵" style="font-size:22px;text-align:center"></div>
      <div class="mfield"><label>رابط الصورة (URL)</label><input id="mi-img" type="url" placeholder="https://..."></div>
      <div class="mfield"><label>خيارات الحجم (اختياري) — مثال: صغير=6,كبير=8</label><input id="mi-vars" type="text" placeholder="صغير=6,كبير=8"></div>
      <div class="mfield" style="display:flex;justify-content:space-between;align-items:center">
        <label style="margin:0">مفعّل</label>
        <input type="checkbox" id="mi-active" checked style="width:20px;height:20px;cursor:pointer">
      </div>
      <button class="msave" onclick="saveMenuItem()">💾 حفظ</button>
      <button class="mdel" id="mi-del-btn" onclick="deleteMenuItem()" style="display:none">🗑️ حذف</button>
    </div>
  </div>
</div>

<!-- ══ QR MODAL ══ -->
<div id="qr-ov" class="modal-ov" onclick="if(event.target===this)closeQR()">
  <div class="modal-sh">
    <div class="mpill"></div>
    <div class="mbody" style="text-align:center">
      <h3 style="color:var(--ac);margin-bottom:16px" id="qr-title">QR طاولة 1</h3>
      <div style="display:flex;justify-content:center;margin-bottom:16px"><div id="qr-canvas" class="qr-wrap"></div></div>
      <p id="qr-url" style="color:var(--tx3);font-size:11px;word-break:break-all;margin-bottom:16px"></p>
      <button onclick="printQR()" style="background:var(--ac);border:none;border-radius:10px;padding:10px 20px;color:#fff;font-weight:700;margin-left:8px">🖨️ طباعة</button>
      <button onclick="closeQR()" style="background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px 20px;color:var(--tx2);font-weight:700">إغلاق</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDalHyDKZxaUB8QIc_H5h-Obkjp7CpMz_k",
  authDomain: "nadelapp-9ec65.firebaseapp.com",
  projectId: "nadelapp-9ec65",
  storageBucket: "nadelapp-9ec65.firebasestorage.app",
  messagingSenderId: "35096470316",
  appId: "1:35096470316:web:a36af035d233aa54094289",
  measurementId: "G-7H6BFZNS1H"
};

var db=null, auth=null, FB_OK=false;
var currentUser=null, userRole="admin";
var _authReady=false;

(function initFB(){
  if(FIREBASE_CONFIG.apiKey==="DISABLED"){
    document.getElementById("l-fb-warn").style.display="block";
    return;
  }
  try{
    // prevent double-init
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db  = firebase.firestore();
    auth= firebase.auth();
    // persist session across refreshes
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function(){});
    FB_OK=true;

    auth.onAuthStateChanged(function(user){
      if(_authReady) return; // handled once
      _authReady=true;
      if(user){
        currentUser=user;
        loadUserRole(user.uid);
      }
      // else: stay on login screen
    });
  }catch(e){
    console.error("Firebase init error:",e);
    document.getElementById("l-fb-warn").style.display="block";
  }
})();

function loadUserRole(uid){
  if(!db){ navToRole(); return; }
  db.collection("users").doc(uid).get()
    .then(function(doc){
      if(doc.exists){
        userRole = doc.data().role||"waiter";
        var name  = doc.data().name||currentUser.email;
        setSafe("user-badge","👤 "+name+" · "+roleLabel(userRole));
        navToRole();
      } else {
        // user exists in Auth but not in Firestore — create default admin record
        return db.collection("users").doc(uid).set({
          name: currentUser.email,
          role: "admin",
          email: currentUser.email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(function(){
          userRole="admin";
          setSafe("user-badge","👤 Admin");
          navToRole();
        });
      }
    })
    .catch(function(e){
      console.warn("loadUserRole error:",e);
      // If Firestore rules block access, proceed with waiter role
      userRole="waiter";
      navToRole();
    });
}

function roleLabel(r){ return r==="admin"?"مدير":r==="kitchen"?"مطبخ":"نادل"; }

function doLogin(){
  if(!FB_OK){ skipLogin(); return; }
  var email=document.getElementById("l-email").value.trim();
  var pass =document.getElementById("l-pass").value;
  if(!email||!pass){
    showLoginErr("أدخل البريد الإلكتروني وكلمة المرور");
    return;
  }
  setLoginLoading(true);
  _authReady=false; // allow onAuthStateChanged to fire again
  auth.signInWithEmailAndPassword(email,pass)
    .then(function(cred){
      // onAuthStateChanged will handle navigation
    })
    .catch(function(e){
      setLoginLoading(false);
      var msg = "خطأ في تسجيل الدخول";
      if(e.code==="auth/wrong-password"||e.code==="auth/invalid-credential") msg="كلمة المرور خاطئة";
      else if(e.code==="auth/user-not-found")  msg="البريد الإلكتروني غير مسجل";
      else if(e.code==="auth/invalid-email")   msg="صيغة البريد الإلكتروني غير صحيحة";
      else if(e.code==="auth/too-many-requests")msg="محاولات كثيرة، حاول لاحقاً";
      else if(e.code==="auth/network-request-failed") msg="تحقق من اتصال الإنترنت";
      showLoginErr(msg);
    });
}

function doRegister(){
  if(!FB_OK){ showLoginErr("Firebase غير مضبوط"); return; }
  var email=document.getElementById("l-email").value.trim();
  var pass =document.getElementById("l-pass").value;
  var name =document.getElementById("r-name").value.trim();
  var role =document.getElementById("r-role").value;
  if(!email||!pass||!name){ showLoginErr("أكمل جميع الحقول"); return; }
  if(pass.length<6){ showLoginErr("كلمة المرور 6 أحرف على الأقل"); return; }
  setLoginLoading(true,"جاري إنشاء الحساب...");
  _authReady=false;
  auth.createUserWithEmailAndPassword(email,pass)
    .then(function(cred){
      return db.collection("users").doc(cred.user.uid).set({
        name:name, role:role, email:email,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    })
    .then(function(){ setLoginLoading(false); })
    .catch(function(e){
      setLoginLoading(false);
      var msg=e.message;
      if(e.code==="auth/email-already-in-use") msg="البريد مستخدم بالفعل، سجّل دخولك";
      else if(e.code==="auth/weak-password")   msg="كلمة المرور ضعيفة جداً";
      showLoginErr(msg);
    });
}

function showLoginErr(msg){
  var el=document.getElementById("l-err"); if(el){el.textContent=msg; el.style.display="block";}
}
function setLoginLoading(on,txt){
  var btn=document.getElementById("l-btn");
  if(!btn)return;
  if(on) btn.innerHTML='<span class="spin"></span>'+(txt||"جاري الدخول...");
  else btn.textContent="🔐 دخول";
}

function showReg(){
  var f=document.getElementById("reg-form");
  f.style.display=f.style.display==="none"?"block":"none";
}

function doLogout(){
  _authReady=false;
  if(auth) auth.signOut().then(function(){ nav("s-login"); detachListeners(); });
  else { nav("s-login"); detachListeners(); }

// ORDERS
// ══════════════════════════════════════════════
var orders=[];
var orderListener=null;

function startListeners(){
  detachListeners();
  if(FB_OK&&db){
    orderListener=db.collection("orders").orderBy("createdAt","desc").limit(200).onSnapshot(function(snap){
      orders=[];snap.forEach(function(doc){orders.push({...doc.data(),fbId:doc.id,id:doc.id});});
      refreshScreens();playBeepIfNew(snap);
    });
  } else {
    // localStorage fallback — poll every 3s
    loadLocalOrders();
    window._pollTimer=setInterval(function(){loadLocalOrders();refreshScreens();},3000);
  }
}
function detachListeners(){
  if(orderListener){orderListener();orderListener=null;}
  if(window._pollTimer){clearInterval(window._pollTimer);}
}
function loadLocalOrders(){
  try{orders=JSON.parse(localStorage.getItem("qamra_orders")||"[]");}catch(e){orders=[];}
}

var lastCount=0;
function playBeepIfNew(snap){
  var n=orders.filter(function(o){return o.status==="pending";}).length;
  if(n>lastCount){playBeep();} lastCount=n;
}

function refreshScreens(){
  var a=document.querySelector(".fscr.on");
  if(!a)return;
  if(a.id==="s-waiter"&&wTab===2)renderWActive();
  if(a.id==="s-kitchen")renderKitchen();
  // update counts
  var wa=document.querySelectorAll("#w-tabs button");
  if(wa.length>2){wa[2].textContent=t("active")+" ("+orders.filter(function(o){return o.status!=="delivered";}).length+")";}
}

function updOrd(id,status){
  if(FB_OK&&db){
    db.collection("orders").doc(id).update({status:status}).catch(function(e){console.error(e);});
  } else {
    var idx=orders.findIndex(function(o){return o.id==id;});
    if(idx>=0){orders[idx].status=status; localStorage.setItem("qamra_orders",JSON.stringify(orders));}
    refreshScreens();
  }
  const lb={preparing:t("preparing"),ready:t("ready"),delivered:t("delivered")};
  toast(lb[status]||status,status==="delivered");
}

function placeOrder(tid,items,by){
  const total=items.reduce(function(s,i){return s+i.price*i.qty;},0);
  const at=new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"});
  if(FB_OK&&db){
    db.collection("orders").add({tableId:tid,items,status:"pending",by,at,total,createdAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(function(){toast(t("send_kitchen")+" ✅",true);}).catch(function(e){toast("خطأ: "+e.message,false);});
  } else {
    const o={id:Date.now(),tableId:tid,items,status:"pending",by,at,total};
    orders.unshift(o); localStorage.setItem("qamra_orders",JSON.stringify(orders));
    toast(t("send_kitchen")+" ✅",true); refreshScreens();
  }
}

// SOUND
// ══════════════════════════════════════════════
function playBeep(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,200,400].forEach(function(delay){
      var o=ctx.createOscillator(); var g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; o.type="sine";
      g.gain.setValueAtTime(0,ctx.currentTime+delay/1000);
      g.gain.linearRampToValueAtTime(0.25,ctx.currentTime+delay/1000+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay/1000+0.25);
      o.start(ctx.currentTime+delay/1000); o.stop(ctx.currentTime+delay/1000+0.3);
    });
  }catch(e){}
}

function saveMenuItem(){
  var name=document.getElementById("mi-name").value.trim();
  var price=parseFloat(document.getElementById("mi-price").value)||0;
  var cat=document.getElementById("mi-cat").value;
  var emoji=document.getElementById("mi-emoji").value.trim()||"🍽️";
  var img=document.getElementById("mi-img").value.trim();
  var varsStr=document.getElementById("mi-vars").value.trim();
  var active=document.getElementById("mi-active").checked;
  var order=parseInt(document.getElementById("mi-order").value)||0;
  if(!name||!price){toast("أدخل الاسم والسعر",false);return;}
  var variants=[];
  if(varsStr){varsStr.split(",").forEach(function(v){var p=v.split("=");if(p.length===2)variants.push({n:p[0].trim(),p:parseFloat(p[1].trim())||0});});}
  var data={name,price,cat,emoji,img,active,order,variants:variants.length?variants:[]};
  if(FB_OK&&db){
    var id=editingItem?editingItem.id:null;
    var ref=id?db.collection("menu").doc(id):db.collection("menu").doc();
    ref.set(data,{merge:true}).then(function(){toast("✅ تم الحفظ",true);closeMenuModal();}).catch(function(e){toast("خطأ: "+e.message,false);});
  } else {
    // Update local MENU
    var id=editingItem?editingItem.id:(MENU.reduce(function(m,x){return Math.max(m,x.id);},0)+1);
    data.id=id;
    var idx=MENU.findIndex(function(m){return m.id===id;});

    toast("✅ تم الحفظ (محلياً)",true); closeMenuModal(); renderMenuCMS();
  }
}
function deleteMenuItem(){
  if(!editingItem)return;
  if(!confirm("حذف "+editingItem.name+"؟"))return;
  if(FB_OK&&db){
    db.collection("menu").doc(editingItem.id).delete().then(function(){toast("🗑️ تم الحذف",true);closeMenuModal();}).catch(function(e){toast("خطأ: "+e.message,false);});
  } else {
    MENU=MENU.filter(function(m){return m.id!==editingItem.id;});
    toast("🗑️ تم الحذف",true); closeMenuModal(); renderMenuCMS();
  }
}

function applyDTP(id){DSD.tplId=id;var tpl=TPLS.find(function(t){return t.id===id;});if(tpl)DSD.ac=tpl.ac;saveDraft();renderDesignPanel();}
function applyDAC(c){DSD.ac=c;saveDraft();renderDesignPanel();}
function applyDEmoji(em){DSD.lv=em;saveDraft();renderDesignPanel();}
function applyDLT(type){DSD.lt=type;if(!DSD.lv)DSD.lv="🌙";saveDraft();renderDesignPanel();}
function applyDRad(r){DSD.rad=r;saveDraft();}
function saveDraft(){localStorage.setItem("qamra_design",JSON.stringify(DSD));}
function saveDesignFinal(){
  var cn=document.getElementById("d-cn");var cs=document.getElementById("d-cs");var tv=document.getElementById("d-textval");
  if(cn)DSD.cn=cn.value;if(cs)DSD.cs=cs.value;if(tv)DSD.lv=tv.value;
  localStorage.setItem("qamra_design",JSON.stringify(DSD));
  if(DSD.cn){var sets=lSettings();sets.cafeName=DSD.cn;sSettings(sets);}
  if(FB_OK&&db&&DSD.cn){db.collection("settings").doc("cafe").set({cafeName:DSD.cn,designConfig:DSD},{merge:true}).catch(function(){});}
  toast("✅ تم حفظ التصميم — سيظهر لدى العملاء فوراً",true);
}
