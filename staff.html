<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>شاهي قمرا — Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Noto+Sans+Bengali:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0800;--bg2:#0a0600;--bg3:#070400;--ac:#d4a017;--ac-bg:rgba(212,160,23,.14);--ac-bd:rgba(212,160,23,.3);--tx:#f0e8cc;--tx2:#a08040;--tx3:#5a4020;--tx4:#342010;--card:rgba(255,255,255,.04);--bd:#1e1400;--bd2:#150f00;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo','Noto Sans Bengali',sans-serif;direction:rtl;background:var(--bg);color:var(--tx);min-height:100vh;}
button{font-family:'Cairo','Noto Sans Bengali',sans-serif;cursor:pointer;border:none;outline:none;}
input,select{font-family:'Cairo','Noto Sans Bengali',sans-serif;outline:none;}
.scr{display:none;flex-direction:column;}.scr.on{display:flex;}
.fscr{display:none;flex-direction:column;height:100vh;}.fscr.on{display:flex;}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:var(--bd);}
.hdr{padding:13px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.back{background:rgba(255,255,255,.07);border-radius:8px;color:var(--tx2);padding:6px 12px;font-size:15px;}
.tabs{display:flex;flex-shrink:0;}
.tab{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;font-weight:700;font-size:12px;transition:color .15s;}
.badge{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;}
.sp{background:rgba(245,158,11,.14);color:#f59e0b;border:1px solid #f59e0b40;}
.sr{background:rgba(59,130,246,.14);color:#3b82f6;border:1px solid #3b82f640;}
.sg{background:rgba(16,185,129,.14);color:#10b981;border:1px solid #10b98140;}
.sd{background:rgba(107,114,128,.12);color:#9ca3af;border:1px solid #9ca3af30;}
.empty{text-align:center;padding:48px 24px;}
.chip{border-radius:8px;padding:3px 10px;font-size:12px;}
#toast-l{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{padding:10px 18px;border-radius:10px;font-size:14px;max-width:280px;text-align:right;animation:si .3s ease;}
@keyframes si{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:3px;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--ac);}
/* LANG SWITCHER */
.lang-bar{display:flex;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0;}
.lang-btn{flex:1;padding:6px 0;background:var(--card);border:1px solid var(--bd);border-radius:8px;color:var(--tx3);font-size:12px;font-weight:700;}
.lang-btn.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac);}
/* LTR support for Bengali */
body.ltr{direction:ltr;text-align:left;}
body.ltr .hdr{direction:ltr;}
</style>
</head>

<div id="toast-l"></div>

<!-- HOME -->
<div id="s-home" class="scr on" style="min-height:100vh;">

    <button class="lang-btn on" id="lb-ar" onclick="setLang('ar')" style="flex:none;padding:5px 12px">العربية</button>

function t(key) { return (TRANS[LANG]&&TRANS[LANG][key]) || TRANS.ar[key] || key; }
function iName(item) { if(LANG==="ar"||!item.id) return item.name; return (ITEM_TRANS[item.id]&&ITEM_TRANS[item.id][LANG])||item.name; }

function setLang(lang) {
  LANG = lang; localStorage.setItem("qamra_lang", lang);
  ["ar","en","bn"].forEach(function(l){ var el=document.getElementById("lb-"+l); if(el) el.classList.toggle("on",l===lang); });
  var isRtl = (lang!=="bn");
  document.documentElement.setAttribute("dir", isRtl?"rtl":"ltr");
  document.documentElement.setAttribute("lang", lang);
  document.body.style.direction = isRtl?"rtl":"ltr";
  rebuildAll();
}

function langBar(ids) {
  return ['<button class="lang-btn'+(LANG==="ar"?" on":"")+'" onclick="setLang(\'ar\')">العربية</button>',
          '<button class="lang-btn'+(LANG==="en"?" on":"")+'" onclick="setLang(\'en\')">English</button>',
          '<button class="lang-btn'+(LANG==="bn"?" on":"")+'" style="font-family:\'Noto Sans Bengali\',sans-serif" onclick="setLang(\'bn\')">বাংলা</button>'].join("");
}

function rebuildAll() {
  var a = document.querySelector(".fscr.on");
  if (!a) { buildHome(); return; }
  if(a.id==="s-waiter")   { buildWaiter(); }
  if(a.id==="s-kitchen")  { buildKitchen(); }
  if(a.id==="s-admin")    { buildAdmin(); }
  if(a.id==="s-settings") { buildSettings(); }
  buildHome(); // update home too (hidden but rebuild for when user goes back)
}

const isDark=()=>{if(S.mode==="dark")return true;if(S.mode==="light")return false;return window.matchMedia("(prefers-color-scheme: dark)").matches;};
function T(){const d=isDark(),ac=S.ac;
  return d?{bg:"#0d0800",bgH:"#0a0600",sf:"rgba(255,255,255,.035)",sfH:"rgba(255,255,255,.07)",bd:"#1e1400",bds:"#150f00",tx:"#f0e8cc",txS:"#a08040",txM:"#5a4020",txF:"#342010",ac,acBg:`${ac}1a`,acBd:`${ac}38`,dark:1}
  :{bg:"#fef9ef",bgH:"#fdf3d8",sf:"rgba(0,0,0,.028)",sfH:"rgba(0,0,0,.056)",bd:"#e2ce96",bds:"#ecdda8",tx:"#1a0800",txS:"#6b4c18",txM:"#9a7a38",txF:"#c4a860",ac,acBg:`${ac}1a`,acBd:`${ac}40`,dark:0};}
function applyTheme(){const t=T();document.body.style.background=t.bg;document.body.style.color=t.tx;
  const r=document.documentElement.style;
  r.setProperty("--bg",t.bg);r.setProperty("--bg2",t.bgH);r.setProperty("--ac",t.ac);r.setProperty("--tx",t.tx);r.setProperty("--tx2",t.txS);r.setProperty("--tx3",t.txM);r.setProperty("--tx4",t.txF);r.setProperty("--card",t.sf);r.setProperty("--bd",t.bd);
  const rgb=hexRgb(t.ac);r.setProperty("--ac-bg",`rgba(${rgb},0.14)`);r.setProperty("--ac-bd",`rgba(${rgb},0.32)`);}
function hexRgb(h){h=h.replace("#","");if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return parseInt(h.substr(0,2),16)+","+parseInt(h.substr(2,2),16)+","+parseInt(h.substr(4,2),16);}

function nav(id){

function toast(m,ok){
  const t2=T();const d=document.createElement("div");d.className="toast";d.textContent=m;
  d.style.background=ok?(t2.dark?"#064e3b":"#d1fae5"):(t2.dark?"#1c1200":"#fffbeb");
  d.style.border=`1px solid ${ok?"#10b981":t2.ac}`;d.style.color=ok?(t2.dark?"#6ee7b7":"#065f46"):(t2.dark?t2.ac:t2.ac);
  d.style.boxShadow=t2.dark?"0 4px 20px rgba(0,0,0,.5)":"0 4px 16px rgba(0,0,0,.1)";
  document.getElementById("toast-l").appendChild(d);setTimeout(()=>d.remove(),3500);}

const BDG={
  pending:`<span class="badge sp"></span>`,
  preparing:`<span class="badge sr"></span>`,
  ready:`<span class="badge sg"></span>`,
  delivered:`<span class="badge sd"></span>`
};
function bdg(status){
  const map={pending:["sp",()=>t("pending")],preparing:["sr",()=>t("preparing")],ready:["sg",()=>t("ready")],delivered:["sd",()=>t("delivered")]};
  const [cls,lbl]=map[status]||map.pending;
  return `<span class="badge ${cls}">${lbl()}</span>`;
}

function updOrd(id,status){
  const orders=go_();const idx=orders.findIndex(o=>o.id===id);
  if(idx>=0){orders[idx].status=status;so(orders);}
  toast(t(status==="preparing"?"preparing":status==="ready"?"ready":"delivered"),status==="delivered");
}
function placeOrder(tid,items,by){
  const orders=go_();
  orders.unshift({id:Date.now(),tableId:tid,items,status:"pending",by,
    at:new Date().toLocaleTimeString("ar-SA",{hour:"2-digit",minute:"2-digit"}),
    total:items.reduce((s,i)=>s+i.price*i.qty,0)});
  so(orders);toast(t("send_kitchen")+" ✅",true);}

function oCard(o,t2,showAct){
  const bc={pending:"#f59e0b",preparing:"#3b82f6",ready:"#10b981",delivered:"#6b7280"};
  const actBtn=showAct&&o.status==="ready"?`<button onclick="updOrd(${o.id},'delivered');renderWActive()" style="background:#4a1942;border:none;border-radius:10px;padding:8px 16px;color:#e879f9;font-weight:700;font-size:13px">${t("mark_delivered")}</button>`:"";
  const itemsHtml=o.items.map(i=>{
    const n=iName(i);
    const sz=i.sizeName?` (${i.sizeName})`:"";
    const note=i.note?`<span style="color:${t2.txM};font-size:11px"> 📝${i.note}</span>`:"";
    return `<div style="margin-bottom:3px"><span class="chip" style="background:${t2.acBg};border:1px solid ${t2.acBd};color:${t2.txS}">${i.emoji} ${n}${sz} ×${i.qty}</span>${note}</div>`;
  }).join("");
  return `<div style="background:${t2.sf};border:1px solid ${(bc[o.status]||"#f59e0b")}28;border-radius:14px;padding:14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      ${bdg(o.status)}
      <div style="text-align:right"><span style="color:${t2.tx};font-weight:700">${t("table_lbl")} ${o.tableId}</span><span style="color:${t2.txM};font-size:12px;margin-right:8px">#${String(o.id).slice(-4)}·${o.at}</span></div>
    </div>
    <div style="margin-bottom:10px">${itemsHtml}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:${t2.ac};font-weight:800;font-size:16px">${o.total} ${t("sar")}</span>${actBtn}
    </div>
  </div>`;}

        <div style="color:${t2.ac};font-weight:800;font-size:13px">${item.price} ${t("sar")}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          ${q>0?`<button onclick="wCQ(${item.id},-1)" style="width:28px;height:28px;background:${t2.sfH};border:1px solid ${t2.bd};border-radius:7px;color:${t2.tx};font-size:15px;display:flex;align-items:center;justify-content:center">−</button><span style="color:#3b82f6;font-weight:900;min-width:18px;text-align:center">${q}</span>`:""}
          <button onclick="wCQ(${item.id},1)" style="width:28px;height:28px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:7px;color:#3b82f6;font-size:15px;display:flex;align-items:center;justify-content:center">+</button>
        </div>
      </div>`;}).join("")}
    <div style="height:80px"></div>
  </div></div>`;
  document.getElementById("w-tc1").innerHTML=html;
  document.getElementById("w-tc1").style.display="flex";
  document.getElementById("w-tc1").style.flexDirection="column";
  document.getElementById("w-tc1").style.flex="1";
  document.getElementById("w-tc1").style.overflow="hidden";
  if(wCart.length>0&&wSel){
    const fl=document.createElement("div");
    fl.style.cssText=`position:sticky;bottom:0;padding:12px 14px;background:linear-gradient(0deg,${t2.bg} 70%,transparent);flex-shrink:0`;
    fl.innerHTML=`<button onclick="wSend()" style="width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:14px;padding:14px 0;color:#fff;font-weight:800;font-size:16px">${t("send_kitchen")} — ${tot} ${t("sar")}</button>`;
    document.getElementById("w-tc1").appendChild(fl);
  }
}
function wCQ(id,d){const item=MENU.find(m=>m.id===id),idx=wCart.findIndex(i=>i.id===id);
  if(idx>=0){wCart[idx].qty+=d;if(wCart[idx].qty<=0)wCart.splice(idx,1);}else if(d>0)wCart.push({...item,qty:1});renderWOrder();}
function wSend(){if(!wSel||!wCart.length)return;placeOrder(wSel,wCart,"waiter");wCart=[];wSel=null;setWTab(0);}
function renderWActive(){
  const t2=T();const orders=go_().filter(o=>o.status!=="delivered");const el=document.getElementById("w-tc2");
  if(!orders.length){el.innerHTML=`<div class="empty"><div style="font-size:52px">✅</div><div style="color:${t2.txM};font-weight:700;margin-top:12px">${t("no_active")}</div></div>`;return;}
  el.innerHTML=orders.map(o=>oCard(o,t2,true)).join("");}

// ════ KITCHEN ════
var kFlt="pending";
function buildKitchen(){
  const t2=T();
  document.getElementById("k-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t2.sfH};color:${t2.txS}">←</button>
    <span>🌙</span><span style="color:${t2.ac};font-weight:800;font-size:16px">${t("kitchen")} 🍳</span>
    <span style="margin-right:auto;color:${t2.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("k-hdr").style.cssText+=`background:${t2.bgH};border-bottom:1px solid ${t2.bd}`;
  buildLangBar("k-lang");renderKitchen();
}
function renderKitchen(){
  const t2=T();const orders=go_();
  const pn=orders.filter(o=>o.status==="pending").length,rn=orders.filter(o=>o.status==="preparing").length;
  document.getElementById("k-stats").innerHTML=[{l:t("waiting"),c:pn,col:"#f59e0b"},{l:t("preparing"),c:rn,col:"#3b82f6"},{l:t("total_orders"),c:orders.length,col:"#10b981"}].map(s=>`<div style="flex:1;background:${s.col}14;border:1px solid ${s.col}30;border-radius:10px;padding:8px 0;text-align:center"><div style="color:${s.col};font-weight:900;font-size:22px">${s.c}</div><div style="color:${s.col}99;font-size:11px">${s.l}</div></div>`).join("");
  document.getElementById("k-filters").innerHTML=[{v:"pending",l:t("filter_pending")},{v:"preparing",l:t("filter_prep")},{v:"all",l:t("filter_all")}].map(f=>`<button onclick="kFlt='${f.v}';renderKitchen()" style="background:${kFlt===f.v?"#065f46":"rgba(16,185,129,.08)"};border:1px solid ${kFlt===f.v?"#10b981":"transparent"};border-radius:20px;padding:6px 14px;color:${kFlt===f.v?"#6ee7b7":"#10b981"};font-weight:700;font-size:12px">${f.l}</button>`).join("");
  const shown=orders.filter(o=>kFlt==="all"?o.status!=="delivered":o.status===kFlt);
  const el=document.getElementById("k-list");
  if(!shown.length){el.innerHTML=`<div class="empty"><div style="font-size:52px">✅</div><div style="color:${t2.txM};font-weight:700;margin-top:12px">${t("no_orders")}</div><div style="color:${t2.txF};font-size:13px;margin-top:6px">${t("waiting_orders")}</div></div>`;return;}
  el.innerHTML=shown.map(o=>{
    const act=o.status==="pending"?`<button onclick="updOrd(${o.id},'preparing');renderKitchen()" style="flex:1;background:#1e3a8a;border:none;border-radius:10px;padding:9px 0;color:#93c5fd;font-weight:700;font-size:13px">${t("start_prep")}</button>`
      :o.status==="preparing"?`<button onclick="updOrd(${o.id},'ready');renderKitchen()" style="flex:1;background:#064e3b;border:none;border-radius:10px;padding:9px 0;color:#6ee7b7;font-weight:700;font-size:13px">${t("mark_ready")}</button>`
      :o.status==="ready"?`<button onclick="updOrd(${o.id},'delivered');renderKitchen()" style="flex:1;background:#4a1942;border:none;border-radius:10px;padding:9px 0;color:#e879f9;font-weight:700;font-size:13px">${t("mark_delivered")}</button>`:"";
    const itemsHtml=o.items.map(i=>{const n=iName(i);const sz=i.sizeName?` (${i.sizeName})`:"";const note=i.note?`<span style="color:${t2.txM};font-size:11px"> 📝${i.note}</span>`:"";
      return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="color:${t2.txS};font-size:13px">${i.emoji} ${n}${sz}${LANG!=="ar"?" <span style='color:"+t2.txM+";font-size:10px'>("+i.name+")</span>":""}</span>${note}
        <span style="background:${t2.acBg};color:${t2.ac};border-radius:8px;padding:2px 10px;font-weight:700;font-size:13px">×${i.qty}</span>
      </div>`;}).join("");
    return `<div style="background:${o.status==="pending"?"rgba(245,158,11,.08)":"rgba(59,130,246,.08)"};border:1px solid ${o.status==="pending"?"#f59e0b30":"#3b82f630"};border-radius:14px;padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px">${bdg(o.status)}<div><span style="color:${t2.tx};font-weight:800">${t("table_lbl")} ${o.tableId}</span><span style="color:${t2.txM};font-size:12px;margin-right:8px">#${String(o.id).slice(-4)}·${o.at}</span></div></div>
      <div style="margin-bottom:12px">${itemsHtml}</div>
      <div style="display:flex;gap:8px">${act}</div>
    </div>`;}).join("");}

// ════ ADMIN ════
function buildAdmin(){
  const t2=T();const orders=go_();
  document.getElementById("a-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t2.sfH};color:${t2.txS}">←</button>
    <span>🌙</span><span style="color:${t2.ac};font-weight:800;font-size:16px">${t("admin")} 📊</span>
    <span style="margin-right:auto;color:${t2.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("a-hdr").style.cssText+=`background:${t2.bgH};border-bottom:1px solid ${t2.bd}`;
  buildLangBar("a-lang");
  const del=orders.filter(o=>o.status==="delivered"),rev=del.reduce((s,o)=>s+o.total,0),pend=orders.filter(o=>o.status==="pending").length;
  const freq={};orders.forEach(o=>o.items.forEach(i=>{freq[i.name]=(freq[i.name]||0)+i.qty;}));
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const C=(e,l,v,col)=>`<div style="background:${col}10;border:1px solid ${col}25;border-radius:14px;padding:14px"><div style="font-size:26px;margin-bottom:4px">${e}</div><div style="color:${col};font-weight:900;font-size:22px">${v}</div><div style="color:${col}88;font-size:12px">${l}</div></div>`;
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
    ${C("📋",t("total_orders"),orders.length,t2.ac)}${C("⏳",t("waiting"),pend,"#f59e0b")}${C("✅",t("delivered_count"),del.length,"#10b981")}${C("💰",t("revenue"),rev+" "+t("sar"),"#8b5cf6")}</div>`;
  if(top.length){html+=`<div style="background:${t2.sf};border:1px solid ${t2.bd};border-radius:14px;padding:14px;margin-bottom:14px"><h3 style="color:${t2.ac};margin:0 0 14px;font-size:15px">${t("top_items")}</h3>
    ${top.map(([n,q],i)=>{const item=MENU.find(m=>m.name===n);const dn=item&&LANG!=="ar"?iName(item):n;
      return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:${t2.txS};font-size:13px">#${i+1} ${dn}</span><span style="color:${t2.ac};font-weight:700;font-size:13px">${q}×</span></div>
      <div style="background:${t2.bds||t2.bd};border-radius:4px;height:6px;overflow:hidden"><div style="height:100%;background:${t2.ac};width:${(q/top[0][1])*100}%;border-radius:4px"></div></div></div>`;}).join("")}
  </div>`;}
  if(orders.length){html+=`<div style="background:${t2.sf};border:1px solid ${t2.bd};border-radius:14px;padding:14px"><h3 style="color:${t2.ac};margin:0 0 12px;font-size:15px">${t("all_orders")}</h3>
    ${orders.map(o=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid ${t2.bd}">
      ${bdg(o.status)}<div style="text-align:right"><div style="color:${t2.tx};font-weight:700;font-size:13px">${t("table_lbl")} ${o.tableId}·#${String(o.id).slice(-4)}</div>
      <div style="color:${t2.txM};font-size:11px">${o.at}·${o.by==="waiter"?t("waiter_tag"):t("customer_tag")}</div></div>
      <span style="color:${t2.ac};font-weight:800">${o.total} ${t("sar")}</span></div>`).join("")}
  </div>`;}
  else html+=`<div class="empty"><div style="font-size:52px">📊</div><div style="color:${t2.txM};font-weight:700;margin-top:12px">${t("no_data")}</div></div>`;
  document.getElementById("a-body").innerHTML=html;
  document.getElementById("a-body").style.background=t2.bg;
}

// ════ SETTINGS ════
const ACCS=[{n:"ذهبي",v:"#d4a017"},{n:"أزرق",v:"#2563eb"},{n:"أخضر",v:"#059669"},{n:"وردي",v:"#db2777"},{n:"بنفسجي",v:"#7c3aed"},{n:"برتقالي",v:"#ea580c"},{n:"تيل",v:"#0891b2"},{n:"أحمر",v:"#dc2626"}];
function buildSettings(){
  const t2=T();
  document.getElementById("st-hdr").innerHTML=`
    <button class="back" onclick="nav('s-home');buildHome()" style="background:${t2.sfH};color:${t2.txS}">←</button>
    <span>🌙</span><span style="color:${t2.ac};font-weight:800;font-size:16px">⚙️ ${t("settings")}</span>
    <span style="margin-right:auto;color:${t2.txF};font-size:12px">${S.cn}</span>`;
  document.getElementById("st-hdr").style.cssText+=`background:${t2.bgH};border-bottom:1px solid ${t2.bd}`;
  buildLangBar("st-lang");
  const sec=(title,ch)=>`<div style="background:${t2.sf};border:1px solid ${t2.bd};border-radius:16px;overflow:hidden;margin-bottom:14px"><div style="padding:11px 16px;border-bottom:1px solid ${t2.bd};background:${t2.sfH}"><span style="color:${t2.txS};font-weight:700;font-size:13px">${title}</span></div><div style="padding:16px">${ch}</div></div>`;
  const row=(l,ch)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid ${t2.bd}"><span style="color:${t2.tx};font-size:14px">${l}</span>${ch}</div>`;
  const IS=`background:${t2.sfH};border:1px solid ${t2.bd};border-radius:8px;color:${t2.tx};padding:7px 12px;font-size:14px;text-align:right;font-family:'Cairo',sans-serif`;
  document.getElementById("st-body").style.background=t2.bg;
  document.getElementById("st-body").innerHTML=
    sec(t("display_mode"),`<div style="display:flex;gap:8px;margin-bottom:12px">
      ${[{v:"auto",l:t("auto_mode")},{v:"dark",l:t("dark_mode")},{v:"light",l:t("light_mode")}].map(o=>`
        <button onclick="S.mode='${o.v}';ss({themeMode:'${o.v}'});loadS();applyTheme();buildSettings()" style="flex:1;background:${S.mode===o.v?t2.acBg:t2.sf};border:1.5px solid ${S.mode===o.v?t2.ac:t2.bd};border-radius:12px;padding:10px 6px;cursor:pointer">
          <div style="color:${S.mode===o.v?t2.ac:t2.txS};font-weight:800;font-size:13px">${o.l}</div>
        </button>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:${t2.acBg};border-radius:10px;border:1px solid ${t2.acBd}">
        <span style="font-size:18px">${isDark()?"🌙":"☀️"}</span>
        <span style="color:${t2.ac};font-size:13px;font-weight:600">${t("current_mode")}: ${isDark()?t("dark_lbl"):t("light_lbl")} ${S.mode==="auto"?t("auto_lbl"):""}</span>
      </div>`) +
    sec(t("accent_color"),`<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px">
      ${ACCS.map(p=>`<button onclick="S.ac='${p.v}';ss({accent:'${p.v}'});applyTheme();buildSettings()" style="width:42px;height:42px;border-radius:50%;background:${p.v};border:3px solid ${S.ac===p.v?"#fff":"transparent"};cursor:pointer;box-shadow:${S.ac===p.v?`0 0 0 2px ${t2.bg},0 0 0 4px ${p.v}`:"none"};display:flex;align-items:center;justify-content:center">${S.ac===p.v?'<span style="color:#fff;font-size:14px;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.6)">✓</span>':""}</button>`).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:10px"><span style="color:${t2.txS};font-size:13px">${t("custom")}:</span>
        <input type="color" value="${S.ac}" onchange="S.ac=this.value;ss({accent:this.value});applyTheme()" style="width:42px;height:34px;border-radius:8px;border:1px solid ${t2.bd};background:${t2.sf};cursor:pointer;padding:2px">
      </div>`) +
    sec(t("table_settings"),`
      ${row(t("table_count"),`<div style="display:flex;align-items:center;gap:10px">
        <button onclick="if(S.tc>1){S.tc--;ss({tableCount:S.tc});document.getElementById('tc-n').textContent=S.tc;renderTP()}" style="width:36px;height:36px;background:${t2.sfH};border:1px solid ${t2.bd};border-radius:9px;color:${t2.txS};font-size:20px;display:flex;align-items:center;justify-content:center">−</button>
        <span id="tc-n" style="color:${t2.tx};font-weight:900;font-size:24px;min-width:38px;text-align:center">${S.tc}</span>
        <button onclick="if(S.tc<50){S.tc++;ss({tableCount:S.tc});document.getElementById('tc-n').textContent=S.tc;renderTP()}" style="width:36px;height:36px;background:${t2.acBg};border:1px solid ${t2.ac};border-radius:9px;color:${t2.ac};font-size:20px;display:flex;align-items:center;justify-content:center">+</button>
      </div>`)}
      <div style="padding:14px 0 6px">
        <input type="range" min="1" max="50" value="${S.tc}" oninput="S.tc=Number(this.value);ss({tableCount:S.tc});document.getElementById('tc-n').textContent=S.tc;renderTP()" style="width:100%;accent-color:${t2.ac}">
        <div style="display:flex;justify-content:space-between;margin-top:4px"><span style="color:${t2.txF};font-size:11px">50</span><span style="color:${t2.ac};font-weight:700;font-size:12px" id="tc-lbl">${S.tc} ${t("tables_label")}</span><span style="color:${t2.txF};font-size:11px">1</span></div>
      </div>
      ${row(t("table_prefix"),`<input value="${S.tp}" onchange="S.tp=this.value;ss({tablePrefix:this.value});renderTP()" style="${IS};width:130px">`)}
      <div id="tprev" style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px"></div>`) +
    sec(t("cafe_info"),`
      ${row(t("cafe_name_lbl"),`<input value="${S.cn}" onchange="S.cn=this.value;ss({cafeName:this.value})" style="${IS};width:160px">`)}
      <div style="margin-top:12px;padding:12px 16px;background:${t2.acBg};border-radius:12px;border:1px solid ${t2.acBd};display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">🌙</span><span style="color:${t2.ac};font-weight:900;font-size:18px">${S.cn}</span>
      </div>`);
  renderTP();
}
function renderTP(){const t2=T();const el=document.getElementById("tprev");if(!el)return;const n=Math.min(S.tc,12);
  el.innerHTML=Array.from({length:n},(_,i)=>`<span style="background:${t2.acBg};border:1px solid ${t2.acBd};border-radius:8px;padding:4px 10px;color:${t2.ac};font-size:12px;font-weight:700">${S.tp} ${i+1}</span>`).join("")+(S.tc>12?`<span style="color:${t2.txM};font-size:12px;padding:4px 8px">+${S.tc-12} ${t("others")}</span>`:"");
  const lb=document.getElementById("tc-lbl");if(lb)lb.textContent=`${S.tc} ${t("tables_label")}`;}

// ════ AUTO REFRESH ════
setInterval(()=>{
  const a=document.querySelector(".fscr.on");if(!a)return;
  if(a.id==="s-kitchen")renderKitchen();
  if(a.id==="s-waiter"&&wTab===2)renderWActive();
},4000);

// ════ INIT ════
loadS();applyTheme();setLang(LANG);buildHome();
</script>
</body>
