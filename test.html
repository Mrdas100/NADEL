<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>اختبار Firebase</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:Arial,sans-serif;direction:rtl;padding:20px;background:#fef8ee;max-width:500px;margin:0 auto;}
h2{color:#c8860a;margin-bottom:20px;}
.step{background:#fff;border:1px solid #e8d8a0;border-radius:12px;padding:14px;margin-bottom:12px;}
.step-t{font-weight:800;font-size:14px;margin-bottom:8px;}
.result{font-size:13px;padding:8px 12px;border-radius:8px;margin-top:8px;word-break:break-all;}
.ok{background:#d1fae5;color:#047857;}
.err{background:#fee2e2;color:#dc2626;}
.pending{background:#fef3c7;color:#b45309;}
button{background:#c8860a;border:none;border-radius:8px;padding:10px 20px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:6px;}
button:active{transform:scale(.98);}
</style>
</head>
<body>
<h2>🔬 اختبار Firebase</h2>

<div class="step">
  <div class="step-t">1️⃣ الاتصال بـ Firebase</div>
  <div class="result pending" id="r1">جاري الاختبار...</div>
</div>

<div class="step">
  <div class="step-t">2️⃣ كتابة طلب تجريبي</div>
  <div class="result" id="r2" style="background:#f5f5f5;color:#666">في الانتظار...</div>
  <button onclick="testWrite()">كتابة للـ Firestore</button>
</div>

<div class="step">
  <div class="step-t">3️⃣ قراءة الطلبات</div>
  <div class="result" id="r3" style="background:#f5f5f5;color:#666">في الانتظار...</div>
  <button onclick="testRead()">قراءة من Firestore</button>
</div>

<div class="step">
  <div class="step-t">4️⃣ المزامنة اللحظية</div>
  <div class="result" id="r4" style="background:#f5f5f5;color:#666">في الانتظار...</div>
  <button onclick="testLive()">تشغيل Listener</button>
</div>

<script>
const FB_CFG={
  apiKey:"AIzaSyDalHyDKZxaUB8QIc_H5h-Obkjp7CpMz_k",
  authDomain:"nadelapp-9ec65.firebaseapp.com",
  projectId:"nadelapp-9ec65",
  storageBucket:"nadelapp-9ec65.firebasestorage.app",
  messagingSenderId:"35096470316",
  appId:"1:35096470316:web:a36af035d233aa54094289"
};

var db=null;

// Test 1: Connect
(function(){
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CFG);
    db=firebase.firestore();
    setResult("r1","ok","✅ Firebase اتصل بنجاح\nالمشروع: nadelapp-9ec65");
  }catch(e){
    setResult("r1","err","❌ فشل الاتصال:\n"+e.message);
  }
})();

// Test 2: Write
function testWrite(){
  if(!db){setResult("r2","err","❌ Firebase غير متصل");return;}
  setResult("r2","pending","⏳ جاري الكتابة...");
  db.collection("test_sync").add({
    msg:"مرحبا من "+navigator.userAgent.substring(0,30),
    time: firebase.firestore.FieldValue.serverTimestamp(),
    ts: Date.now()
  }).then(function(ref){
    setResult("r2","ok","✅ تمت الكتابة بنجاح\nID: "+ref.id);
  }).catch(function(e){
    setResult("r2","err","❌ فشل الكتابة:\nCode: "+e.code+"\n"+e.message);
  });
}

// Test 3: Read
function testRead(){
  if(!db){setResult("r3","err","❌ Firebase غير متصل");return;}
  setResult("r3","pending","⏳ جاري القراءة...");
  db.collection("test_sync").limit(5).get().then(function(snap){
    if(snap.empty){
      setResult("r3","ok","✅ القراءة تعمل — لا يوجد بيانات بعد (اكتب أولاً)");
    } else {
      var docs=[];
      snap.forEach(function(d){docs.push("• "+d.id.substring(0,8)+"...");});
      setResult("r3","ok","✅ تمت القراءة — "+snap.size+" وثيقة:\n"+docs.join("\n"));
    }
  }).catch(function(e){
    setResult("r3","err","❌ فشل القراءة:\nCode: "+e.code+"\n"+e.message);
  });
}

// Test 4: Live listener
var liveListener=null;
function testLive(){
  if(!db){setResult("r4","err","❌ Firebase غير متصل");return;}
  if(liveListener){liveListener();liveListener=null;setResult("r4","pending","⏹️ تم إيقاف الـ Listener");return;}
  setResult("r4","pending","⏳ جاري تشغيل Listener...");
  var count=0;
  liveListener=db.collection("test_sync").onSnapshot(function(snap){
    count++;
    setResult("r4","ok","✅ Listener يعمل — استقبل "+count+" تحديث\n"+snap.size+" وثيقة موجودة\nآخر تحديث: "+new Date().toLocaleTimeString());
  },function(e){
    setResult("r4","err","❌ Listener فشل:\nCode: "+e.code+"\n"+e.message);
  });
  document.querySelector("#r4+button").textContent="⏹️ إيقاف الـ Listener";
}

function setResult(id,cls,msg){
  var el=document.getElementById(id);
  el.className="result "+cls;
  el.textContent=msg;
}
</script>
</body>
</html>
